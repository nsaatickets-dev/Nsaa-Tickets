<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="only light" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/jpeg" href="/fav.jpg" />
    <link rel="apple-touch-icon" href="/fav.jpg" />
    <title>Door scanner | Nsaa Tickets</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body class="scanner-body">
    <nav class="navbar nsaa-navbar">
      <div class="container">
        <a
          class="nsaa-brand-lockup"
          href="/"
          aria-label="Nsaa Tickets home"
        >
          <img class="nsaa-brand-mark" src="/logo.jpeg" alt="" width="38" height="38" />
          <span class="visually-hidden">Nsaa Tickets</span>
        </a>
        <span class="ms-auto nsaa-muted small">Door scanner</span>
      </div>
    </nav>

    <main class="container py-4" style="max-width: 560px">
      <div id="scanner-root">
        <div class="mb-3">
          <label class="form-label nsaa-muted small" for="scanner-name"
            >Staff name optional</label
          >
          <input
            id="scanner-name"
            class="form-control form-control-nsaa"
            type="text"
            placeholder="Gate A"
          />
        </div>
        <video id="scanner-video" playsinline muted></video>
        <canvas id="scanner-canvas" class="d-none"></canvas>
        <div
          id="scan-result"
          class="scanner-console scan-result-wait p-4 mt-3 text-center"
        >
          <div>
            <p class="h4 mb-2">Ready to scan</p>
            <p class="mb-0">Point the camera at a Nsaa ticket QR code.</p>
          </div>
        </div>
      </div>
    </main>

    <script src="js/convex-config.js"></script>
    <script src="js/nsaa.js"></script>
    <script type="module">
      import { ConvexClient } from "https://esm.sh/convex/browser";
      import jsQR from "https://esm.sh/jsqr@1.4.0";

      const root = document.getElementById("scanner-root");

      // Staff devices are set up once with a scanner token generated from
      // the organizer dashboard. Older ?key= links still work as a legacy
      // fallback because the backend accepts both tokenized staff links and
      // the deployment-level shared scanner key.
      const KEY_STORAGE = "nsaa:scannerToken";
      const urlKey =
        new URLSearchParams(window.location.search).get("token") ||
        new URLSearchParams(window.location.search).get("key");
      if (urlKey) {
        try {
          window.localStorage.setItem(KEY_STORAGE, urlKey);
        } catch (err) {
          // ignore - key just won't persist across reloads on this device
        }
      }
      let scannerKey = urlKey;
      if (!scannerKey) {
        try {
          scannerKey = window.localStorage.getItem(KEY_STORAGE);
        } catch (err) {
          scannerKey = null;
        }
      }
      if (!NSAA.isConvexConfigured()) {
        root.innerHTML = NSAA.setupNotice("Scanner");
      } else if (!scannerKey) {
        root.innerHTML = `
          <div class="nsaa-panel">
            <p class="nsaa-eyebrow mb-2">Scanner setup</p>
            <h1 class="h4 mb-2">Enter scanner token</h1>
            <p class="nsaa-muted mb-4">Use the staff scanner link or token created from the organizer dashboard.</p>
            <form id="scanner-token-form">
              <label class="form-label nsaa-muted small" for="scanner-token">Scanner token</label>
              <input id="scanner-token" class="form-control form-control-nsaa" type="password" autocomplete="off" required />
              <button class="btn btn-nsaa w-100 mt-3" type="submit">Start scanning</button>
            </form>
          </div>
        `;
        document.getElementById("scanner-token-form").addEventListener("submit", (event) => {
          event.preventDefault();
          const token = document.getElementById("scanner-token").value.trim();
          if (!token) return;
          try {
            window.localStorage.setItem(KEY_STORAGE, token);
          } catch (err) {
            // ignore - URL token still works for this session
          }
          window.location.href = `/scan?token=${encodeURIComponent(token)}`;
        });
      } else {
        const client = new ConvexClient(NSAA.CONVEX_URL);
        const video = document.getElementById("scanner-video");
        const canvas = document.getElementById("scanner-canvas");
        const ctx = canvas.getContext("2d");
        const resultEl = document.getElementById("scan-result");
        const staffInput = document.getElementById("scanner-name");

        let cooldownUntil = 0;
        let lastToken = "";

        function showResult(kind, title, body) {
          const className =
            kind === "ok"
              ? "scanner-console scan-result-ok p-4 mt-3 text-center"
              : kind === "fail"
                ? "scanner-console scan-result-fail p-4 mt-3 text-center"
                : "scanner-console scan-result-wait p-4 mt-3 text-center";

          resultEl.className = className;
          resultEl.innerHTML = `
          <div>
            <p class="display-6 fw-bold mb-2">${NSAA.escapeHtml(title)}</p>
            <p class="fs-5 mb-0">${NSAA.escapeHtml(body)}</p>
          </div>
        `;
        }

        async function handleScan(qrToken) {
          if (qrToken === lastToken && Date.now() < cooldownUntil) return;
          lastToken = qrToken;
          cooldownUntil = Date.now() + 2200;
          showResult("wait", "Checking", "Validating this ticket now.");

          try {
            const scannedBy = staffInput.value.trim() || undefined;
            const result = await client.mutation("tickets:validateScan", {
              qrToken,
              scannedBy,
              scannerKey,
            });

            if (result.ok) {
              showResult("ok", "VALID", `Welcome ${result.ownerName}${result.gateLabel ? ` · ${result.gateLabel}` : ""}`);
            } else {
              showResult(
                "fail",
                "REJECTED",
                result.reason || "Ticket could not be accepted.",
              );
            }
          } catch (err) {
            showResult(
              "fail",
              "SCAN ERROR",
              err.message || "Could not validate ticket.",
            );
          }
        }

        function tick() {
          if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(
              0,
              0,
              canvas.width,
              canvas.height,
            );
            const code = jsQR(
              imageData.data,
              imageData.width,
              imageData.height,
            );
            if (code && Date.now() > cooldownUntil) {
              handleScan(code.data);
            }
          }
          requestAnimationFrame(tick);
        }

        navigator.mediaDevices
          .getUserMedia({ video: { facingMode: "environment" } })
          .then((stream) => {
            video.srcObject = stream;
            video.play();
            requestAnimationFrame(tick);
          })
          .catch(() => {
            showResult(
              "fail",
              "CAMERA BLOCKED",
              "Allow camera access in the browser to scan tickets.",
            );
          });
      }
    </script>
  </body>
</html>

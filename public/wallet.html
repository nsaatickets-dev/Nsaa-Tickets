<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="only light" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="module" src="js/nsaa-chrome.js"></script>
    <title>My tickets | Nsaa Tickets</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div id="nsaa-chrome-nav"></div>

    <script src="js/clerk-config.js"></script>
    <script src="js/clerk-loader.js"></script>

<main class="container py-5" style="max-width: 980px">
      <div
        class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-4"
      >
        <div>
          <p class="nsaa-eyebrow mb-2">Wallet</p>
          <h1 class="nsaa-section-title mb-0">My tickets</h1>
        </div>
        <a class="btn btn-outline-nsaa align-self-md-end" href="/"
          >Find events</a
        >
      </div>
      <div id="tickets-root"></div>
    </main>

    <div id="nsaa-chrome-footer"></div>

    <script src="js/convex-config.js"></script>
    <script src="js/nsaa.js"></script>
    <script type="module">
      import { ConvexClient } from "https://esm.sh/convex/browser";
      import QRCode from "https://esm.sh/qrcode@1.5.4";

      const params = new URLSearchParams(window.location.search);
      const orderId = params.get("orderId");
      const root = document.getElementById("tickets-root");
      const lastOrderId = window.localStorage.getItem("nsaa:lastOrderId");

      function statusLabel(status) {
        if (status === "used")
          return { label: "Used", className: "ticket-status-used" };
        if (status === "void")
          return { label: "Void", className: "ticket-status-void" };
        if (status === "pending")
          return { label: "Pending", className: "nsaa-muted" };
        return { label: "Valid", className: "ticket-status-valid" };
      }

      function renderTicketGroup(group, groupIndex = 0) {
        const { order, event, ticketType, tickets } = group;
        const walletLink = `${window.location.origin}/wallet?orderId=${encodeURIComponent(order._id)}`;
        const shareText = `Nsaa ticket for ${event?.title || "this event"}: ${walletLink}`;
        const whatsappLink = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
        const emailLink = `mailto:?subject=${encodeURIComponent("Nsaa ticket")}&body=${encodeURIComponent(shareText)}`;
        return `
        <section class="nsaa-panel mb-4">
          <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
            <div>
              <span class="nsaa-chip mb-3" data-tone="${NSAA.escapeAttr(NSAA.categoryMeta(event?.category).tone)}">${NSAA.escapeHtml(NSAA.categoryMeta(event?.category).shortLabel)}</span>
              <h2 class="h4 mb-1">${NSAA.escapeHtml(event?.title || "Nsaa event")}</h2>
              <p class="nsaa-muted mb-0">${NSAA.escapeHtml(ticketType?.name || "Ticket")} &middot; ${NSAA.escapeHtml(event?.venue || "Venue")} &middot; ${NSAA.escapeHtml(order.quantity)} ticket${order.quantity === 1 ? "" : "s"}</p>
            </div>
            <div class="text-lg-end">
              <p class="nsaa-faint small mb-1">Order total</p>
              <p class="h5 mb-0" style="color: var(--nsaa-gold);">${NSAA.money(order.totalGHS)}</p>
              <div class="d-flex flex-wrap justify-content-lg-end gap-2 mt-3">
                <a class="btn btn-outline-nsaa btn-sm" href="${NSAA.escapeAttr(whatsappLink)}" target="_blank" rel="noreferrer">WhatsApp</a>
                <a class="btn btn-outline-nsaa btn-sm" href="${NSAA.escapeAttr(emailLink)}">Email link</a>
              </div>
            </div>
          </div>
          <div class="row g-3">
            ${tickets
              .map((ticket, ticketIndex) => {
                const status = statusLabel(ticket.status);
                const canvasId = `qr-${groupIndex}-${ticketIndex}`;
                return `
                <div class="col-md-6 col-xl-4">
                  <article class="nsaa-card nsaa-ticket-stub p-3 h-100 text-center">
                    <p class="nsaa-faint small mb-1">TICKET ${ticketIndex + 1} OF ${tickets.length}</p>
                    <h3 class="h6 mb-3">${NSAA.escapeHtml(ticket.ownerName)}</h3>
                    <div class="nsaa-ticket-perforation"></div>
                    <div class="nsaa-qr-shell mb-3">
                      <canvas id="${NSAA.escapeAttr(canvasId)}" data-token="${NSAA.escapeAttr(ticket.qrToken)}" aria-label="Ticket QR code"></canvas>
                    </div>
                    <p class="fw-semibold mb-1 ${NSAA.escapeAttr(status.className)}">${NSAA.escapeHtml(status.label)}</p>
                    <p class="nsaa-faint small mb-0">Non-transferable ticket</p>
                  </article>
                </div>
              `;
              })
              .join("")}
          </div>
        </section>
      `;
      }

      async function drawQRCodes() {
        const canvases = [...document.querySelectorAll("canvas[data-token]")];
        for (const canvas of canvases) {
          try {
            await QRCode.toCanvas(canvas, canvas.dataset.token, {
              width: 220,
              margin: 1,
              color: {
                dark: "#0f0e11",
                light: "#ffffff",
              },
            });
          } catch (err) {
            console.error("Failed to render QR code", err);
            const shell = canvas.parentElement;
            if (shell) {
              shell.innerHTML = `<div class="p-3 text-dark small" style="max-width: 220px; font-family: sans-serif;">Could not render QR code. Please refresh or contact door staff.</div>`;
            }
          }
        }
      }

      async function renderOrder(group) {
        if (!group) {
          root.innerHTML = NSAA.emptyState(
            "Order not found",
            "Use the ticket link sent after payment or check the order status page.",
            '<a class="btn btn-nsaa" href="/">Find events</a>',
          );
          return;
        }

        if (!group.tickets || group.tickets.length === 0) {
          const action = `<a class="btn btn-nsaa" href="/order-status?orderId=${NSAA.escapeAttr(group.order._id)}">Check order status</a>`;
          const message =
            group.order.status === "reserved"
              ? "Payment may still be waiting for confirmation."
              : "Tickets are issued after a successful payment webhook.";
          root.innerHTML = NSAA.emptyState(
            "Tickets not issued yet",
            message,
            action,
          );
          return;
        }

        root.innerHTML = renderTicketGroup(group, 0);
        await drawQRCodes();
      }

      async function renderCurrentUser(groups) {
        if (!groups || groups.length === 0) {
          const action = lastOrderId
            ? `<a class="btn btn-nsaa" href="/wallet?orderId=${NSAA.escapeAttr(lastOrderId)}">Open last order</a>`
            : '<a class="btn btn-nsaa" href="/">Find events</a>';
          root.innerHTML = NSAA.emptyState(
            "No tickets in this wallet",
            "Paid tickets linked to your signed-in account will appear here.",
            action,
          );
          return;
        }

        root.innerHTML = groups
          .map((group, index) => renderTicketGroup(group, index))
          .join("");
        await drawQRCodes();
      }

      if (!NSAA.isConvexConfigured()) {
        root.innerHTML = NSAA.setupNotice("Wallet");
      } else {
        root.innerHTML = NSAA.loading("Loading tickets");
        const client = new ConvexClient(NSAA.CONVEX_URL);
        await NSAA.attachConvexAuth(client);
        const clerk = await NSAA.getClerk();

        if (orderId) {
          client.onUpdate(
            "tickets:ticketsForOrderDetailed",
            { orderId },
            renderOrder,
          );
        } else if (clerk?.user || clerk?.isSignedIn) {
          client.onUpdate(
            "tickets:ticketsForCurrentUserDetailed",
            {},
            renderCurrentUser,
          );
        } else {
          const action = lastOrderId
            ? `<a class="btn btn-nsaa" href="/wallet?orderId=${NSAA.escapeAttr(lastOrderId)}">Open last order</a>`
            : '<a class="btn btn-nsaa" href="/">Find events</a>';
          root.innerHTML = NSAA.emptyState(
            "Open a ticket order",
            "Use the order link from checkout, SMS, or email. Sign in to see account-linked tickets once Clerk is configured.",
            action,
          );
        }
      }
    </script>
    <script src="js/clerk-nav.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="only light" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/jpeg" href="/fav.jpg" />
    <link rel="apple-touch-icon" href="/fav.jpg" />
    <title>Welcome | Nsaa Tickets</title>
    <meta name="robots" content="noindex" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body class="checkout-body">
    <nav class="navbar nsaa-navbar">
      <div class="container">
        <a class="nsaa-brand-lockup" href="/" aria-label="Nsaa Tickets home">
          <img class="nsaa-brand-mark" src="/logo.jpeg" alt="" width="38" height="38" />
          <span class="visually-hidden">Nsaa Tickets</span>
        </a>
      </div>
    </nav>

    <script src="js/clerk-config.js"></script>
    <script src="js/clerk-loader.js"></script>
    <script src="js/convex-config.js"></script>

    <main class="container py-5" style="max-width: 520px">
      <div id="welcome-root">
        <div class="text-center py-5">
          <span class="nsaa-progress-dots" aria-hidden="true"><span></span><span></span><span></span></span>
        </div>
      </div>
    </main>

    <script src="js/nsaa.js"></script>
    <script type="module">
      import { ConvexClient } from "https://esm.sh/convex/browser";

      const params = new URLSearchParams(window.location.search);
      const redirectUrl = params.get("redirect_url") || "/";
      const root = document.getElementById("welcome-root");

      const REFERRAL_OPTIONS = [
        "Instagram",
        "TikTok",
        "Facebook / X",
        "Friend or family",
        "An organizer's page",
        "Google search",
        "Radio or flyer",
        "Other",
      ];

      const ROLE_OPTIONS = [
        "I'm here to buy tickets",
        "I organize events",
        "I work with an organizer",
        "Media / press",
        "Other",
      ];

      function goToDestination() {
        window.location.href = redirectUrl;
      }

      function choiceGroupHtml(name, options) {
        return `
          <div class="nsaa-quick-filter-row" data-group="${NSAA.escapeAttr(name)}">
            ${options
              .map(
                (option) =>
                  `<button type="button" class="nsaa-quick-filter" data-value="${NSAA.escapeAttr(option)}">${NSAA.escapeHtml(option)}</button>`,
              )
              .join("")}
          </div>
        `;
      }

      function renderSurvey() {
        root.innerHTML = `
          <div class="text-center mb-4">
            <h1 class="h3 mb-2">Welcome to Nsaa Tickets</h1>
            <p class="nsaa-muted small mb-0">Two quick questions - this helps us build the right thing for you.</p>
          </div>
          <div class="nsaa-panel">
            <form id="welcome-form">
              <div class="mb-4">
                <label class="form-label fw-semibold mb-2">Where did you hear about Nsaa Tickets?</label>
                ${choiceGroupHtml("referralSource", REFERRAL_OPTIONS)}
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold mb-2">What best describes you?</label>
                ${choiceGroupHtml("role", ROLE_OPTIONS)}
              </div>
              <div id="welcome-error"></div>
              <button id="welcome-submit" class="btn btn-nsaa w-100 mt-2" type="submit" disabled>Continue</button>
            </form>
            <p class="text-center mt-3 mb-0">
              <button id="welcome-skip" class="btn btn-link nsaa-muted small p-0" type="button">Skip for now</button>
            </p>
          </div>
        `;

        const state = { referralSource: "", role: "" };
        const submitBtn = document.getElementById("welcome-submit");
        const errorEl = document.getElementById("welcome-error");

        function syncSubmitEnabled() {
          submitBtn.disabled = !(state.referralSource && state.role);
        }

        root.querySelectorAll(".nsaa-quick-filter-row").forEach((group) => {
          const groupName = group.dataset.group;
          group.addEventListener("click", (event) => {
            const button = event.target.closest(".nsaa-quick-filter");
            if (!button) return;
            group.querySelectorAll(".nsaa-quick-filter").forEach((btn) => btn.classList.remove("active"));
            button.classList.add("active");
            state[groupName] = button.dataset.value;
            syncSubmitEnabled();
          });
        });

        document.getElementById("welcome-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          submitBtn.disabled = true;
          submitBtn.textContent = "Saving...";
          try {
            await client.mutation("onboarding:submit", {
              referralSource: state.referralSource,
              role: state.role,
            });
            goToDestination();
          } catch (err) {
            errorEl.innerHTML = NSAA.errorState("Could not save", err.message || "Please try again.");
            submitBtn.disabled = false;
            submitBtn.textContent = "Continue";
          }
        });

        document.getElementById("welcome-skip").addEventListener("click", async () => {
          try {
            await client.mutation("onboarding:skip", {});
          } catch (err) {
            // Not worth blocking on - the survey will just show again next time.
          }
          goToDestination();
        });
      }

      let client = null;

      async function boot() {
        if (!NSAA.isConvexConfigured()) {
          goToDestination();
          return;
        }

        const clerk = await NSAA.getClerk();
        if (!clerk || !(clerk.user || clerk.isSignedIn)) {
          goToDestination();
          return;
        }

        client = new ConvexClient(NSAA.CONVEX_URL);
        const attached = await NSAA.attachConvexAuth(client);
        if (!attached) {
          goToDestination();
          return;
        }

        try {
          const status = await client.query("onboarding:getMyStatus", {});
          if (status) {
            goToDestination();
            return;
          }
        } catch (err) {
          goToDestination();
          return;
        }

        renderSurvey();
      }

      boot();
    </script>
  </body>
</html>

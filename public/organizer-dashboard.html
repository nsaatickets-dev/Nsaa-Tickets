<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="module" src="js/nsaa-chrome.js"></script>
    <title>Organizer dashboard | Nsaa Tickets</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div id="nsaa-chrome-nav"></div>

    <script src="js/clerk-config.js"></script>
    <script src="js/clerk-loader.js"></script>

<main class="container py-5" style="max-width: 980px">
      <div
        class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-4"
      >
        <div>
          <p class="nsaa-eyebrow mb-2">Dashboard</p>
          <h1 class="nsaa-section-title mb-0">Your events</h1>
        </div>
        <a
          id="new-event-btn"
          class="btn btn-nsaa align-self-md-end"
          href="/organizer-dashboard?new=1"
          >New event</a
        >
      </div>
      <div id="dashboard-root"></div>
    </main>

    <div id="nsaa-chrome-footer"></div>

    <script src="js/convex-config.js"></script>
    <script src="js/nsaa.js"></script>
    <script type="module">
      import { ConvexClient } from "https://esm.sh/convex/browser";
      import QRCode from "https://esm.sh/qrcode@1.5.4";

      const root = document.getElementById("dashboard-root");
      const newEventBtn = document.getElementById("new-event-btn");
      const params = new URLSearchParams(window.location.search);
      const eventId = params.get("eventId");
      const isNew = params.has("new");
      let clerk = null;

      function statusChip(status) {
        const tone =
          status === "published" ? "green" : status === "cancelled" ? "rose" : "blue";
        const label =
          status === "published" ? "Published" : status === "cancelled" ? "Cancelled" : "Draft";
        return `<span class="nsaa-chip" data-tone="${NSAA.escapeAttr(tone)}">${NSAA.escapeHtml(label)}</span>`;
      }

      function signInGate() {
        const redirectUrl = `/organizer-dashboard${window.location.search}`;
        root.innerHTML = NSAA.emptyState(
          "Sign in to manage your events",
          "The organizer dashboard is tied to your Nsaa account so only you can edit or publish your own events.",
          `<a id="dashboard-sign-in" class="btn btn-nsaa" href="/signin?redirect_url=${encodeURIComponent(redirectUrl)}">Sign in</a>`,
        );
        newEventBtn.classList.add("d-none");
      }

      // ---- List view ----
      function renderList(events) {
        if (!events || events.length === 0) {
          root.innerHTML = NSAA.emptyState(
            "No events yet",
            "Create your first event to start selling tickets.",
            '<a class="btn btn-nsaa" href="/organizer-dashboard?new=1">New event</a>',
          );
          return;
        }

        root.innerHTML = events
          .map(
            (event) => `
          <a class="text-decoration-none d-block mb-3" href="/organizer-dashboard?eventId=${NSAA.escapeAttr(event._id)}">
            <div class="nsaa-panel d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2">
              <div>
                <div class="d-flex align-items-center gap-2 mb-2">
                  ${statusChip(event.status)}
                  <span class="nsaa-chip" data-tone="${NSAA.escapeAttr(NSAA.categoryMeta(event.category).tone)}">${NSAA.escapeHtml(NSAA.categoryMeta(event.category).shortLabel)}</span>
                </div>
                <h2 class="h5 mb-1">${NSAA.escapeHtml(event.title)}</h2>
                <p class="nsaa-muted small mb-0">${NSAA.escapeHtml(event.venue)}, ${NSAA.escapeHtml(event.city)} &middot; ${NSAA.escapeHtml(NSAA.formatDate(event.startsAt))}</p>
              </div>
              <i class="ph ph-caret-right nsaa-muted"></i>
            </div>
          </a>
        `,
          )
          .join("");
      }

      // ---- Editor view (create or edit) ----
      function eventFormHtml(event) {
        const startsAtValue = event?.startsAt
          ? new Date(event.startsAt).toISOString().slice(0, 16)
          : "";
        return `
        <form id="event-form">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label nsaa-muted small" for="ef-title">Event title</label>
              <input id="ef-title" class="form-control form-control-nsaa" type="text" value="${NSAA.escapeAttr(event?.title || "")}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label nsaa-muted small" for="ef-category">Category</label>
              <select id="ef-category" class="form-select form-select-nsaa" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label nsaa-muted small" for="ef-age">Age rating optional</label>
              <select id="ef-age" class="form-select form-select-nsaa">
                <option value="">Not specified</option>
                <option value="all-ages" ${event?.ageRating === "all-ages" ? "selected" : ""}>All ages</option>
                <option value="18-plus" ${event?.ageRating === "18-plus" ? "selected" : ""}>18+</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label nsaa-muted small" for="ef-description">Description</label>
              <textarea id="ef-description" class="form-control form-control-nsaa" rows="3" required>${NSAA.escapeHtml(event?.description || "")}</textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label nsaa-muted small" for="ef-venue">Venue</label>
              <input id="ef-venue" class="form-control form-control-nsaa" type="text" value="${NSAA.escapeAttr(event?.venue || "")}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label nsaa-muted small" for="ef-city">City</label>
              <input id="ef-city" class="form-control form-control-nsaa" type="text" value="${NSAA.escapeAttr(event?.city || "")}" required />
            </div>
            <div class="col-12">
              <label class="form-label nsaa-muted small" for="ef-address">Address</label>
              <input id="ef-address" class="form-control form-control-nsaa" type="text" value="${NSAA.escapeAttr(event?.address || "")}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label nsaa-muted small" for="ef-starts">Starts at</label>
              <input id="ef-starts" class="form-control form-control-nsaa" type="datetime-local" value="${startsAtValue}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label nsaa-muted small" for="ef-image">Hero image URL optional</label>
              <input id="ef-image" class="form-control form-control-nsaa" type="url" value="${NSAA.escapeAttr(event?.heroImageUrl || "")}" placeholder="https://..." />
            </div>
            <div class="col-md-6">
              <label class="form-label nsaa-muted small" for="ef-organizer-name">Organizer display name</label>
              <input id="ef-organizer-name" class="form-control form-control-nsaa" type="text" value="${NSAA.escapeAttr(event?.organizerName || "")}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label nsaa-muted small" for="ef-payout-phone">Payout Mobile Money number optional</label>
              <input id="ef-payout-phone" class="form-control form-control-nsaa" type="tel" value="${NSAA.escapeAttr(event?.organizerPayoutPhone || "")}" placeholder="024 000 0000" />
            </div>
          </div>
          <div id="event-form-result" class="mt-3"></div>
          <button id="event-form-submit" class="btn btn-nsaa mt-4" type="submit">
            ${event ? "Save changes" : "Create event"}
          </button>
        </form>
      `;
      }

      function ticketTypeRowHtml(t) {
        return `
        <div class="nsaa-meta-item d-flex justify-content-between align-items-center mb-2" data-ticket-type-id="${NSAA.escapeAttr(t._id)}">
          <div>
            <p class="mb-0 fw-semibold">${NSAA.escapeHtml(t.name)}</p>
            <p class="nsaa-muted small mb-0">${NSAA.money(t.priceGHS)} &middot; ${t.quantityAvailable} of ${t.quantityTotal} available &middot; ${t.quantitySold} sold</p>
          </div>
          <button class="btn btn-outline-nsaa btn-sm delete-ticket-type" type="button" ${t.quantitySold + t.quantityReserved > 0 ? "disabled title=\"Can't delete a ticket type with sold or reserved tickets\"" : ""}>
            Remove
          </button>
        </div>
      `;
      }

      function salesSummaryHtml(summary) {
        return `
        <div class="row g-3 mb-4">
          <div class="col-6 col-md-3">
            <div class="nsaa-meta-item">
              <p class="nsaa-faint small mb-1">Tickets sold</p>
              <p class="h5 mb-0">${summary.ticketsSold}</p>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="nsaa-meta-item">
              <p class="nsaa-faint small mb-1">Gross revenue</p>
              <p class="h5 mb-0" style="color: var(--nsaa-gold);">${NSAA.money(summary.grossRevenueGHS)}</p>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="nsaa-meta-item">
              <p class="nsaa-faint small mb-1">Paid orders</p>
              <p class="h5 mb-0">${summary.ordersPaid}</p>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="nsaa-meta-item">
              <p class="nsaa-faint small mb-1">Pending orders</p>
              <p class="h5 mb-0">${summary.ordersPending}</p>
            </div>
          </div>
        </div>
      `;
      }

      function absoluteEventUrl(event, refCode = "") {
        const url = new URL(NSAA.eventHref(event), window.location.origin);
        if (refCode) url.searchParams.set("ref", refCode);
        return url.toString();
      }

      function shareToolkitHtml(event, summary) {
        const directUrl = absoluteEventUrl(event);
        const referralRows = summary?.referralSummary?.length
          ? summary.referralSummary
              .map(
                (row) => `
                <div class="d-flex justify-content-between gap-3 py-1">
                  <span class="nsaa-muted">${NSAA.escapeHtml(row.code)}</span>
                  <span>${row.tickets} tickets · ${NSAA.money(row.revenueGHS)}</span>
                </div>
              `,
              )
              .join("")
          : '<p class="nsaa-muted small mb-0">Referral sales appear after buyers purchase through a campaign link.</p>';

        return `
        <div class="nsaa-panel mb-4">
          <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-3">
            <div>
              <h2 class="h5 mb-1">Distribution kit</h2>
              <p class="nsaa-muted small mb-0">Share links, poster QR codes, embed snippets, and referral codes for this event.</p>
            </div>
            <a class="btn btn-outline-nsaa align-self-lg-start" href="${NSAA.escapeAttr(directUrl)}" target="_blank" rel="noreferrer">Open public page</a>
          </div>
          <div class="row g-3">
            <div class="col-lg-5">
              <label class="form-label nsaa-muted small" for="campaign-code">Campaign or promoter code</label>
              <div class="d-flex gap-2">
                <input id="campaign-code" class="form-control form-control-nsaa" type="text" value="main" />
                <button id="copy-campaign-link" class="btn btn-nsaa" type="button">Copy</button>
              </div>
              <div class="d-grid gap-2 mt-2">
                <a id="whatsapp-campaign-link" class="btn btn-outline-nsaa" target="_blank" rel="noreferrer" href="#">Share on WhatsApp</a>
                <button id="copy-embed-code" class="btn btn-outline-nsaa" type="button">Copy embed</button>
              </div>
              <textarea id="embed-code" class="form-control form-control-nsaa mt-2" rows="3" readonly></textarea>
            </div>
            <div class="col-lg-3 text-center">
              <div class="nsaa-qr-shell">
                <canvas id="event-share-qr" aria-label="Event share QR code"></canvas>
              </div>
              <p class="nsaa-faint small mt-2 mb-0">Poster QR updates with the campaign code.</p>
            </div>
            <div class="col-lg-4">
              <div class="nsaa-price-breakdown p-3 h-100">
                <p class="fw-semibold mb-2">Referral performance</p>
                ${referralRows}
              </div>
            </div>
          </div>
        </div>
      `;
      }

      function scannerStaffShellHtml() {
        return `
        <div class="nsaa-panel mb-4">
          <h2 class="h5 mb-1">Scanner staff</h2>
          <p class="nsaa-muted small mb-3">Create revocable scanner links for each gate or door team. The full token is shown once.</p>
          <form id="scanner-staff-form" class="row g-2 align-items-end">
            <div class="col-md-4">
              <label class="form-label nsaa-muted small" for="scanner-staff-name">Staff name</label>
              <input id="scanner-staff-name" class="form-control form-control-nsaa" type="text" placeholder="Gate A lead" required />
            </div>
            <div class="col-md-3">
              <label class="form-label nsaa-muted small" for="scanner-gate-label">Gate</label>
              <input id="scanner-gate-label" class="form-control form-control-nsaa" type="text" placeholder="VIP Gate" required />
            </div>
            <div class="col-md-3">
              <label class="form-label nsaa-muted small" for="scanner-role">Role</label>
              <select id="scanner-role" class="form-select form-select-nsaa">
                <option value="scanner">Scanner</option>
                <option value="lead">Lead</option>
              </select>
            </div>
            <div class="col-md-2">
              <button class="btn btn-nsaa w-100" type="submit">Create</button>
            </div>
          </form>
          <div id="scanner-token-result" class="mt-3"></div>
          <div id="scanner-staff-list" class="mt-3"></div>
        </div>
      `;
      }

      function bindShareToolkit(event, summary) {
        const campaignInput = document.getElementById("campaign-code");
        const embedEl = document.getElementById("embed-code");
        const whatsappEl = document.getElementById("whatsapp-campaign-link");
        const canvas = document.getElementById("event-share-qr");
        if (!campaignInput || !embedEl || !whatsappEl || !canvas) return;

        async function sync() {
          const code = campaignInput.value.trim();
          const link = absoluteEventUrl(event, code);
          const embedUrl = new URL("/embed", window.location.origin);
          embedUrl.searchParams.set("eventId", event._id);
          if (code) embedUrl.searchParams.set("ref", code);
          embedEl.value = `<iframe src="${embedUrl.toString()}" width="100%" height="420" style="border:0;" loading="lazy"></iframe>`;
          whatsappEl.href = `https://wa.me/?text=${encodeURIComponent(`${event.title} tickets: ${link}`)}`;
          await QRCode.toCanvas(canvas, link, {
            width: 180,
            margin: 1,
            color: { dark: "#241f1a", light: "#ffffff" },
          });
        }

        campaignInput.addEventListener("input", sync);
        document.getElementById("copy-campaign-link").addEventListener("click", async () => {
          await navigator.clipboard.writeText(absoluteEventUrl(event, campaignInput.value.trim()));
        });
        document.getElementById("copy-embed-code").addEventListener("click", async () => {
          await navigator.clipboard.writeText(embedEl.value);
        });
        sync();
      }

      function renderScannerStaff(staffRows) {
        const list = document.getElementById("scanner-staff-list");
        if (!list) return;
        if (!staffRows || staffRows.length === 0) {
          list.innerHTML = '<p class="nsaa-muted small mb-0">No scanner staff links yet.</p>';
          return;
        }

        list.innerHTML = staffRows
          .map(
            (staff) => `
            <div class="nsaa-meta-item d-flex flex-column flex-md-row justify-content-between gap-2 mb-2" data-scanner-staff-id="${NSAA.escapeAttr(staff._id)}">
              <div>
                <p class="mb-0 fw-semibold">${NSAA.escapeHtml(staff.name)} <span class="nsaa-chip ms-1">${NSAA.escapeHtml(staff.role)}</span></p>
                <p class="nsaa-muted small mb-0">${NSAA.escapeHtml(staff.gateLabel)} · token ends ${NSAA.escapeHtml(staff.tokenPreview)} · ${NSAA.escapeHtml(staff.status)}</p>
              </div>
              <button class="btn btn-outline-nsaa btn-sm revoke-scanner-staff" type="button" ${staff.status === "revoked" ? "disabled" : ""}>Revoke</button>
            </div>
          `,
          )
          .join("");
      }

      function renderScanLogs(logs) {
        const slot = document.getElementById("scan-log-slot");
        if (!slot) return;
        const rows = logs && logs.length
          ? logs
              .map(
                (log) => `
                <div class="d-flex justify-content-between gap-3 py-2 nsaa-divider-dashed">
                  <div>
                    <p class="mb-0 fw-semibold ${log.outcome === "accepted" ? "ticket-status-valid" : "ticket-status-used"}">${log.outcome === "accepted" ? "Accepted" : "Rejected"}</p>
                    <p class="nsaa-muted small mb-0">${NSAA.escapeHtml(log.gateLabel || "Gate")} · ${NSAA.escapeHtml(log.scannedBy || "Scanner")}</p>
                  </div>
                  <div class="text-end">
                    <p class="nsaa-faint small mb-0">${NSAA.escapeHtml(NSAA.formatDate(log.createdAt))}</p>
                    <p class="nsaa-muted small mb-0">${NSAA.escapeHtml(log.reason || "OK")}</p>
                  </div>
                </div>
              `,
              )
              .join("")
          : '<p class="nsaa-muted small mb-0">Recent scan results appear here once doors open.</p>';

        slot.innerHTML = `
          <div class="nsaa-panel mb-4">
            <h2 class="h5 mb-3">Recent scan log</h2>
            ${rows}
          </div>
        `;
      }

      function setupScannerStaff(client, eventId) {
        const staffForm = document.getElementById("scanner-staff-form");
        const tokenResult = document.getElementById("scanner-token-result");
        if (!staffForm || !tokenResult) return;

        client.onUpdate("tickets:listScannerStaff", { eventId }, renderScannerStaff);
        client.onUpdate("tickets:scanLogsForEvent", { eventId }, renderScanLogs);

        staffForm.addEventListener("submit", async (evt) => {
          evt.preventDefault();
          const payload = {
            eventId,
            name: document.getElementById("scanner-staff-name").value.trim(),
            gateLabel: document.getElementById("scanner-gate-label").value.trim(),
            role: document.getElementById("scanner-role").value,
          };
          try {
            const result = await client.mutation("tickets:createScannerStaff", payload);
            const scanUrl = `${window.location.origin}/scan?token=${encodeURIComponent(result.token)}`;
            tokenResult.innerHTML = `
              <div class="nsaa-status-box success">
                <p class="fw-semibold mb-1">Scanner link created</p>
                <p class="mb-2">This full token is shown once. Share the link only with door staff.</p>
                <div class="d-flex gap-2">
                  <input class="form-control form-control-nsaa" value="${NSAA.escapeAttr(scanUrl)}" readonly />
                  <button id="copy-scanner-link" class="btn btn-nsaa" type="button">Copy</button>
                </div>
              </div>
            `;
            document.getElementById("copy-scanner-link").addEventListener("click", async () => {
              await navigator.clipboard.writeText(scanUrl);
            });
            staffForm.reset();
          } catch (err) {
            tokenResult.innerHTML = NSAA.errorState("Could not create scanner", err.message || "Please try again.");
          }
        });

        document.getElementById("scanner-staff-list").addEventListener("click", async (evt) => {
          const button = evt.target.closest(".revoke-scanner-staff");
          if (!button) return;
          const row = button.closest("[data-scanner-staff-id]");
          button.disabled = true;
          try {
            await client.mutation("tickets:revokeScannerStaff", {
              scannerStaffId: row.dataset.scannerStaffId,
            });
          } catch (err) {
            tokenResult.innerHTML = NSAA.errorState("Could not revoke scanner", err.message || "Please try again.");
            button.disabled = false;
          }
        });
      }

      function populateCategorySelect(selected) {
        const select = document.getElementById("ef-category");
        if (!select) return;
        select.innerHTML = NSAA.categories
          .map(
            (item) =>
              `<option value="${NSAA.escapeAttr(item.value)}" ${item.value === selected ? "selected" : ""}>${NSAA.escapeHtml(item.label)}</option>`,
          )
          .join("");
      }

      function readEventForm() {
        return {
          title: document.getElementById("ef-title").value.trim(),
          description: document.getElementById("ef-description").value.trim(),
          venue: document.getElementById("ef-venue").value.trim(),
          city: document.getElementById("ef-city").value.trim(),
          address: document.getElementById("ef-address").value.trim(),
          startsAt: new Date(document.getElementById("ef-starts").value).getTime(),
          heroImageUrl: document.getElementById("ef-image").value.trim() || undefined,
          category: document.getElementById("ef-category").value,
          ageRating: document.getElementById("ef-age").value || undefined,
          organizerName: document.getElementById("ef-organizer-name").value.trim(),
          organizerPayoutPhone:
            document.getElementById("ef-payout-phone").value.trim() || undefined,
        };
      }

      const PLAN_OPTIONS = [
        { tier: "free", label: "Free", fee: "0%", blurb: "Non-ticketed or free events." },
        { tier: "essential", label: "Essential", fee: "4%", blurb: "Small to medium paid events." },
        { tier: "pro", label: "Pro", fee: "6.5%", blurb: "Growth-focused, higher-volume events." },
      ];

      function planPickerHtml(currentTier) {
        const selected = currentTier || "essential";
        return `
        <div class="nsaa-panel mb-4">
          <h2 class="h5 mb-1">Your plan</h2>
          <p class="nsaa-muted small mb-3">Applies to every event on your account. Nsaa's fee is a percentage of ticket price only - never charged on free tickets. Need a custom rate for a large event? <a href="/contact">Contact us</a>.</p>
          <div class="row g-2" id="plan-picker">
            ${PLAN_OPTIONS.map(
              (opt) => `
              <div class="col-sm-4">
                <label class="nsaa-meta-item d-block mb-0" style="cursor: pointer; ${opt.tier === selected ? "border-color: var(--nsaa-gold);" : ""}">
                  <input type="radio" name="plan-tier" value="${opt.tier}" class="form-check-input me-2" ${opt.tier === selected ? "checked" : ""} />
                  <span class="fw-semibold">${opt.label}</span>
                  <span class="nsaa-faint small d-block mt-1">${opt.fee} per paid ticket</span>
                  <span class="nsaa-faint small d-block">${opt.blurb}</span>
                </label>
              </div>
            `,
            ).join("")}
          </div>
        </div>
      `;
      }

      async function renderEditor(client, existingEvent) {
        const isEditing = Boolean(existingEvent);
        const organizerProfile = isEditing
          ? null
          : await client.query("events:myOrganizerTier", {});

        root.innerHTML = `
        <a class="nsaa-nav-link d-inline-flex align-items-center gap-1 mb-4" href="/organizer-dashboard">
          <i class="ph ph-arrow-left"></i> Back to my events
        </a>
        <div id="sales-summary-slot"></div>
        <div id="share-toolkit-slot"></div>
        ${isEditing ? "" : planPickerHtml(organizerProfile?.tier)}
        <div class="nsaa-panel mb-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0">${isEditing ? "Edit event" : "New event"}</h2>
            ${isEditing ? `<span id="status-slot">${statusChip(existingEvent.status)}</span>` : ""}
          </div>
          ${eventFormHtml(existingEvent)}
        </div>
        <div id="ticket-types-slot"></div>
        <div id="scanner-staff-slot"></div>
        <div id="scan-log-slot"></div>
      `;

        populateCategorySelect(existingEvent?.category);

        const form = document.getElementById("event-form");
        const resultEl = document.getElementById("event-form-result");
        const submitBtn = document.getElementById("event-form-submit");

        form.addEventListener("submit", async (evt) => {
          evt.preventDefault();
          resultEl.innerHTML = "";
          const fields = readEventForm();

          if (!fields.title || !fields.description || !fields.venue || !fields.city || !fields.address || !fields.organizerName || !fields.startsAt || Number.isNaN(fields.startsAt)) {
            resultEl.innerHTML = NSAA.errorState(
              "Check event details",
              "Title, description, venue, city, address, start time, and organizer name are all required.",
            );
            return;
          }

          submitBtn.disabled = true;
          submitBtn.textContent = "Saving...";
          try {
            if (isEditing) {
              await client.mutation("events:updateEvent", {
                eventId: existingEvent._id,
                ...fields,
              });
              resultEl.innerHTML = `<div class="nsaa-status-box success"><p class="fw-semibold mb-1">Saved</p><p class="mb-0">Your event details were updated.</p></div>`;
            } else {
              const selectedTier =
                document.querySelector('input[name="plan-tier"]:checked')?.value || "essential";
              await client.mutation("events:setOrganizerTier", { tier: selectedTier });
              const newId = await client.mutation("events:createEvent", fields);
              window.location.href = `/organizer-dashboard?eventId=${encodeURIComponent(newId)}`;
              return;
            }
          } catch (err) {
            resultEl.innerHTML = NSAA.errorState(
              "Could not save event",
              err.message || "Please try again.",
            );
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = isEditing ? "Save changes" : "Create event";
          }
        });

        if (!isEditing) return;

        // Publish / unpublish toggle
        const statusSlot = document.getElementById("status-slot");
        const toggleBtn = document.createElement("button");
        toggleBtn.className = "btn btn-outline-nsaa btn-sm ms-2";
        toggleBtn.type = "button";
        toggleBtn.textContent =
          existingEvent.status === "published" ? "Unpublish" : "Publish";
        toggleBtn.addEventListener("click", async () => {
          toggleBtn.disabled = true;
          try {
            const nextStatus =
              existingEvent.status === "published" ? "draft" : "published";
            await client.mutation("events:setEventStatus", {
              eventId: existingEvent._id,
              status: nextStatus,
            });
            existingEvent.status = nextStatus;
            statusSlot.innerHTML = statusChip(nextStatus);
            statusSlot.appendChild(toggleBtn);
            toggleBtn.textContent =
              nextStatus === "published" ? "Unpublish" : "Publish";
          } catch (err) {
            resultEl.innerHTML = NSAA.errorState(
              "Could not update status",
              err.message || "Please try again.",
            );
          } finally {
            toggleBtn.disabled = false;
          }
        });
        statusSlot.appendChild(toggleBtn);
        document.getElementById("scanner-staff-slot").innerHTML = scannerStaffShellHtml();
        setupScannerStaff(client, existingEvent._id);

        // Sales summary + ticket types (reactive)
        client.onUpdate(
          "events:salesSummaryForEvent",
          { eventId: existingEvent._id },
          (summary) => {
            if (!summary) return;
            document.getElementById("sales-summary-slot").innerHTML =
              salesSummaryHtml(summary);
            document.getElementById("share-toolkit-slot").innerHTML =
              shareToolkitHtml(existingEvent, summary);
            bindShareToolkit(existingEvent, summary);
            renderTicketTypes(client, existingEvent._id, summary.ticketTypes);
          },
        );
      }

      function renderTicketTypes(client, eventId, ticketTypes) {
        const slot = document.getElementById("ticket-types-slot");
        slot.innerHTML = `
        <div class="nsaa-panel">
          <h2 class="h5 mb-3">Ticket types</h2>
          <div id="ticket-type-list">
            ${ticketTypes.length ? ticketTypes.map(ticketTypeRowHtml).join("") : '<p class="nsaa-muted small mb-3">No ticket types yet.</p>'}
          </div>
          <form id="ticket-type-form" class="row g-2 align-items-end mt-2">
            <div class="col-sm-4">
              <label class="form-label nsaa-muted small" for="tt-name">Name</label>
              <input id="tt-name" class="form-control form-control-nsaa" type="text" placeholder="Regular" required />
            </div>
            <div class="col-sm-3">
              <label class="form-label nsaa-muted small" for="tt-price">Price GHS</label>
              <input id="tt-price" class="form-control form-control-nsaa" type="number" min="0" step="0.01" placeholder="80" required />
            </div>
            <div class="col-sm-3">
              <label class="form-label nsaa-muted small" for="tt-quantity">Quantity</label>
              <input id="tt-quantity" class="form-control form-control-nsaa" type="number" min="1" placeholder="100" required />
            </div>
            <div class="col-sm-2">
              <button class="btn btn-nsaa w-100" type="submit">Add</button>
            </div>
          </form>
          <div id="ticket-type-result" class="mt-2"></div>
        </div>
      `;

        slot.querySelectorAll(".delete-ticket-type").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const row = btn.closest("[data-ticket-type-id]");
            const ticketTypeId = row.dataset.ticketTypeId;
            btn.disabled = true;
            try {
              await client.mutation("events:deleteTicketType", { ticketTypeId });
            } catch (err) {
              document.getElementById("ticket-type-result").innerHTML =
                NSAA.errorState("Could not remove ticket type", err.message || "Please try again.");
              btn.disabled = false;
            }
          });
        });

        const ttForm = document.getElementById("ticket-type-form");
        ttForm.addEventListener("submit", async (evt) => {
          evt.preventDefault();
          const resultEl = document.getElementById("ticket-type-result");
          resultEl.innerHTML = "";
          const name = document.getElementById("tt-name").value.trim();
          const priceGHS = Number(document.getElementById("tt-price").value);
          const quantityTotal = Number(document.getElementById("tt-quantity").value);

          if (!name || Number.isNaN(priceGHS) || priceGHS < 0 || !Number.isInteger(quantityTotal) || quantityTotal < 1) {
            resultEl.innerHTML = NSAA.errorState(
              "Check ticket type",
              "Provide a name, a price of 0 or more, and a whole-number quantity of at least 1.",
            );
            return;
          }

          try {
            await client.mutation("events:createTicketType", {
              eventId,
              name,
              priceGHS,
              quantityTotal,
            });
            ttForm.reset();
          } catch (err) {
            resultEl.innerHTML = NSAA.errorState(
              "Could not add ticket type",
              err.message || "Please try again.",
            );
          }
        });
      }

      // ---- Boot ----
      if (!NSAA.isConvexConfigured()) {
        root.innerHTML = NSAA.setupNotice("Organizer dashboard");
        newEventBtn.classList.add("d-none");
      } else {
        root.innerHTML = NSAA.loading("Loading dashboard");
        const client = new ConvexClient(NSAA.CONVEX_URL);
        await NSAA.attachConvexAuth(client);
        clerk = await NSAA.getClerk();

        if (!clerk) {
          root.innerHTML = NSAA.emptyState(
            "Clerk setup needed",
            "Add your Clerk publishable key and Frontend API URL before using organizer accounts.",
          );
          newEventBtn.classList.add("d-none");
        } else if (!clerk.user && !clerk.isSignedIn) {
          signInGate();
        } else if (isNew) {
          newEventBtn.classList.add("d-none");
          renderEditor(client, null);
        } else if (eventId) {
          newEventBtn.classList.add("d-none");
          const event = await client.query("events:getById", { eventId });
          if (!event) {
            root.innerHTML = NSAA.emptyState(
              "Event not found",
              "It may have been removed, or the link is incorrect.",
              '<a class="btn btn-nsaa" href="/organizer-dashboard">Back to my events</a>',
            );
          } else {
            renderEditor(client, event);
          }
        } else {
          client.onUpdate("events:eventsForCurrentOrganizer", {}, renderList);
        }
      }
    </script>
    <script src="js/clerk-nav.js"></script>
  </body>
</html>

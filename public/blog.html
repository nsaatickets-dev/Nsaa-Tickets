<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="module" src="js/nsaa-chrome.js"></script>
    <title>News | Nsaa Tickets</title>
    <meta
      name="description"
      content="Updates, announcements, and stories from Nsaa Tickets."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div id="nsaa-chrome-nav"></div>

    <script src="js/clerk-config.js"></script>
    <script src="js/clerk-loader.js"></script>

<header class="nsaa-hero-band text-center">
      <div class="container nsaa-hero-inner">
        <div class="row justify-content-center">
          <div class="col-lg-10 col-xl-8">
            <p class="nsaa-eyebrow mb-3">News</p>
            <h1 class="nsaa-page-title mb-4">What's happening at Nsaa.</h1>
            <p class="lead nsaa-muted mb-0 mx-auto" style="max-width: 680px;">
              Product updates, platform announcements, and stories from
              organizers and events across Ghana.
            </p>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="container py-5">
        <div class="nsaa-card nsaa-empty p-5">
          <div>
            <h2 class="h4 mb-2">Nothing published yet.</h2>
            <p class="nsaa-muted mb-3">
              We're just getting started - check back soon for updates, or
              follow along on our socials in the meantime.
            </p>
            <a class="btn btn-nsaa" href="/">Browse events</a>
          </div>
        </div>
      </section>
    </main>

    <div id="nsaa-chrome-footer"></div>

    <script src="js/convex-config.js"></script>
    <script src="js/nsaa.js"></script>
    <script src="js/clerk-nav.js"></script>
  </body>
</html>

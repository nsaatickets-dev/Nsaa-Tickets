<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="only light" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Order status | Nsaa Tickets</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body class="checkout-body">
    <nav class="navbar nsaa-navbar">
      <div class="container">
        <a
          class="nsaa-brand-lockup"
          href="/"
          aria-label="Nsaa Tickets home"
        >
          <span class="nsaa-wordmark">Nsaa</span>
          <span class="nsaa-brand-tickets" aria-label="Tickets"
            >T I C K E T S</span
          >
        </a>
        <span class="ms-auto nsaa-muted small">Order status</span>
      </div>
    </nav>

    <main class="container py-5" style="max-width: 760px">
      <div id="status-root"></div>
    </main>

    <script src="js/convex-config.js"></script>
    <script src="js/nsaa.js"></script>
    <script type="module">
      import { ConvexClient } from "https://esm.sh/convex/browser";

      const params = new URLSearchParams(window.location.search);
      const orderId =
        params.get("orderId") ||
        window.localStorage.getItem("nsaa:lastOrderId");
      const root = document.getElementById("status-root");
      let client = null;
      let refreshInFlight = false;
      let autoRefreshAttempted = false;

      function statusCopy(order) {
        if (order.status === "paid") {
          return {
            kind: "success",
            title: "Payment confirmed",
            body: "Your ticket QR code is ready.",
            activeStep: 3,
          };
        }
        if (order.status === "reserved" && order.moolreStatus === "rejected") {
          return {
            kind: "failed",
            title: "Payment could not start",
            body: order.moolreFailureReason
              ? `${order.moolreFailureReason} No ticket was issued. Start a fresh checkout or try another payment method.`
              : "Moolre did not accept this payment attempt. Start a fresh checkout or try another payment method.",
            activeStep: 1,
          };
        }
        if (
          order.status === "reserved" &&
          (order.moolreStatus === "otp_required" || order.moolreStatus === "otp_invalid")
        ) {
          return {
            kind: "waiting",
            title: "Verification code needed",
            body: "Return to the checkout tab to enter the SMS verification code. If that tab is closed, start a fresh checkout from the event page.",
            activeStep: 2,
          };
        }
        if (order.status === "failed") {
          return {
            kind: "failed",
            title: "Payment could not be confirmed",
            body: order.moolreFailureReason
              ? `${order.moolreFailureReason} No ticket was issued.`
              : "No ticket was issued. Start a fresh checkout from the event page or contact support if this keeps happening.",
            activeStep: 1,
          };
        }
        if (order.status === "expired") {
          return {
            kind: "failed",
            title: "Reservation expired",
            body: "The ticket hold ended before payment was confirmed. Inventory has been released.",
            activeStep: 1,
          };
        }
        if (order.status === "refunded") {
          return {
            kind: "failed",
            title: "Order refunded",
            body: "This order has been refunded because the event was cancelled.",
            activeStep: 3,
          };
        }
        return {
          kind: "waiting",
          title: order.moolreExternalRef ? "Waiting for payment confirmation" : "Payment not started",
          body: order.moolreExternalRef
            ? "If you already approved the prompt or completed card checkout, keep this page open or use Check payment status."
            : "This order is reserved, but payment has not started yet. Return to checkout or start fresh from the event page.",
          activeStep: 2,
        };
      }

      function render(summary) {
        if (!summary) {
          root.innerHTML = NSAA.emptyState(
            "Order not found",
            "Check the link from your SMS or email and try again.",
            '<a class="btn btn-nsaa" href="/">Back to discovery</a>',
          );
          return;
        }

        const { order, event, ticketType } = summary;
        const copy = statusCopy(order);
        const walletLink = `/wallet?orderId=${encodeURIComponent(order._id)}`;
        const eventLink = event
          ? `/event?id=${encodeURIComponent(event._id)}`
          : "/";
        const shareText = `My Nsaa ticket for ${event?.title || "this event"} is ready: ${window.location.origin}${walletLink}`;
        const whatsappLink = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
        const emailLink = `mailto:?subject=${encodeURIComponent("Nsaa ticket")}&body=${encodeURIComponent(shareText)}`;

        root.innerHTML = `
        <section class="nsaa-panel">
          <p class="nsaa-eyebrow mb-2">Order ${NSAA.escapeHtml(order._id.slice(-6).toUpperCase())}</p>
          <h1 class="h2 mb-3">${NSAA.escapeHtml(copy.title)}</h1>
          <div class="nsaa-status-box ${NSAA.escapeAttr(copy.kind)} mb-4">
            <p class="fw-semibold mb-1">${NSAA.escapeHtml(copy.title)} ${copy.kind === "waiting" ? '<span class="nsaa-progress-dots" aria-hidden="true"><span></span><span></span><span></span></span>' : ""}</p>
            <p class="mb-0">${NSAA.escapeHtml(copy.body)}</p>
          </div>

          <div class="nsaa-order-timeline mb-4">
            <div class="nsaa-timeline-step active">
              <span class="nsaa-timeline-dot"></span>
              <div>
                <p class="mb-0 fw-semibold">Reservation created</p>
                <p class="nsaa-muted small mb-0">${NSAA.escapeHtml(NSAA.formatDate(order.createdAt))}</p>
              </div>
            </div>
            <div class="nsaa-timeline-step ${copy.activeStep >= 2 ? "active" : ""}">
              <span class="nsaa-timeline-dot"></span>
              <div>
                <p class="mb-0 fw-semibold">Payment confirmation</p>
                <p class="nsaa-muted small mb-0">${order.moolreStatus ? NSAA.escapeHtml(order.moolreStatus) : "Awaiting Moolre update"}</p>
              </div>
            </div>
            <div class="nsaa-timeline-step ${copy.activeStep >= 3 ? "active" : ""}">
              <span class="nsaa-timeline-dot"></span>
              <div>
                <p class="mb-0 fw-semibold">Ticket issued</p>
                <p class="nsaa-muted small mb-0">${order.paidAt ? NSAA.escapeHtml(NSAA.formatDate(order.paidAt)) : "Issued after successful payment"}</p>
              </div>
            </div>
          </div>

          <div class="nsaa-price-breakdown p-3 mb-4">
            <div class="d-flex justify-content-between py-1">
              <span class="nsaa-muted">Event</span>
              <span class="text-end">${NSAA.escapeHtml(event?.title || "Event")}</span>
            </div>
            <div class="d-flex justify-content-between py-1">
              <span class="nsaa-muted">Ticket</span>
              <span>${NSAA.escapeHtml(ticketType?.name || "Ticket")}</span>
            </div>
            <div class="d-flex justify-content-between py-1">
              <span class="nsaa-muted">Subtotal</span>
              <span>${NSAA.money(order.ticketSubtotalGHS)}</span>
            </div>
            <div class="d-flex justify-content-between py-1">
              <span class="nsaa-muted">Service fee</span>
              <span>${NSAA.money(order.serviceFeeGHS)}</span>
            </div>
            <div class="d-flex justify-content-between fw-semibold pt-2 mt-2 nsaa-divider-dashed">
              <span>Total</span>
              <span style="color: var(--nsaa-gold);">${NSAA.money(order.totalGHS)}</span>
            </div>
          </div>

          <div class="d-grid gap-2 d-sm-flex">
            ${order.status === "paid" ? `<a class="btn btn-nsaa" href="${NSAA.escapeAttr(walletLink)}">View tickets</a>` : ""}
            ${order.status === "paid" ? `<a class="btn btn-nsaa" href="${NSAA.escapeAttr(whatsappLink)}" target="_blank" rel="noreferrer">Send on WhatsApp</a>` : ""}
            ${order.status === "paid" ? `<a class="btn btn-nsaa" href="${NSAA.escapeAttr(emailLink)}">Email link</a>` : ""}
            ${order.status === "reserved" && order.moolreExternalRef ? `<button id="refresh-payment-btn" class="btn btn-nsaa" type="button"><i class="ph ph-arrows-clockwise me-1" aria-hidden="true"></i>Check payment status</button>` : ""}
            <a class="btn btn-nsaa" href="${NSAA.escapeAttr(eventLink)}">Back to event</a>
          </div>
          <p id="refresh-payment-note" class="nsaa-faint small mb-0 mt-3"></p>
        </section>
      `;

        document.getElementById("refresh-payment-btn")?.addEventListener("click", () => {
          refreshPaymentStatus();
        });

        if (
          params.get("check") === "1" &&
          order.status === "reserved" &&
          order.moolreExternalRef &&
          !autoRefreshAttempted
        ) {
          autoRefreshAttempted = true;
          window.setTimeout(() => refreshPaymentStatus({ silent: true }), 500);
        }
      }

      async function refreshPaymentStatus({ silent = false } = {}) {
        if (!client || !orderId || refreshInFlight) return;
        refreshInFlight = true;
        const button = document.getElementById("refresh-payment-btn");
        const note = document.getElementById("refresh-payment-note");
        const previousHtml = button?.innerHTML;
        if (button) {
          button.disabled = true;
          button.innerHTML = `<i class="ph ph-spinner-gap me-1" aria-hidden="true"></i>Checking`;
        }
        if (note && !silent) {
          note.textContent = "Asking Moolre for the latest status...";
        }

        try {
          const result = await client.action("orders:refreshPaymentStatus", { orderId });
          if (result.status === "paid") {
            window.location.href = `/wallet?orderId=${encodeURIComponent(orderId)}`;
            return;
          }
          if (note) {
            note.textContent =
              result.status === "reserved"
                ? "Still waiting for Moolre confirmation. If you paid, check again in a few seconds."
                : `Order is now ${result.status}.`;
          }
        } catch (err) {
          if (note) {
            note.textContent = err.message || "Could not check payment status. Try again in a few seconds.";
          }
        } finally {
          refreshInFlight = false;
          if (button) {
            button.disabled = false;
            button.innerHTML = previousHtml || `<i class="ph ph-arrows-clockwise me-1" aria-hidden="true"></i>Check payment status`;
          }
        }
      }

      if (!orderId) {
        root.innerHTML = NSAA.emptyState(
          "No order selected",
          "Open the status link from checkout, SMS, or email.",
          '<a class="btn btn-nsaa" href="/">Back to discovery</a>',
        );
      } else if (!NSAA.isConvexConfigured()) {
        root.innerHTML = NSAA.setupNotice("Order status");
      } else {
        root.innerHTML = NSAA.loading("Checking order status");
        client = new ConvexClient(NSAA.CONVEX_URL);
        client.onUpdate("orders:getOrderSummary", { orderId }, render);
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="module" src="js/nsaa-chrome.js"></script>
    <title>Venues | Nsaa Tickets</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div id="nsaa-chrome-nav"></div>

    <script src="js/clerk-config.js"></script>
    <script src="js/clerk-loader.js"></script>

    <main>
      <header class="nsaa-hero-band">
        <div class="container nsaa-hero-inner">
          <p class="nsaa-eyebrow mb-3">Venues</p>
          <h1 class="nsaa-page-title mb-3">Find the rooms where Ghana gathers.</h1>
          <p class="lead nsaa-muted mb-0" style="max-width: 640px;">Browse venues with upcoming Nsaa events, maps, verified profile signals, and previous listings.</p>
        </div>
      </header>

      <section class="container py-5">
        <div id="venues-root"></div>
      </section>
    </main>

    <div id="nsaa-chrome-footer"></div>

    <script src="js/convex-config.js"></script>
    <script src="js/nsaa.js"></script>
    <script type="module">
      import { ConvexClient } from "https://esm.sh/convex/browser";

      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");
      const root = document.getElementById("venues-root");

      function renderList(profiles) {
        if (!profiles?.length) {
          root.innerHTML = NSAA.emptyState("No venue profiles yet", "Published events will automatically create venue pages.");
          return;
        }
        root.innerHTML = `<div class="row g-3">${profiles
          .map(
            (venue) => `
            <div class="col-md-6 col-xl-4">
              <a class="text-decoration-none d-block h-100" href="/venues?slug=${NSAA.escapeAttr(venue.slug)}">
                <article class="nsaa-panel h-100">
                  <span class="nsaa-chip mb-3">${venue.verified ? "Verified" : `${venue.eventCount} event${venue.eventCount === 1 ? "" : "s"}`}</span>
                  <h2 class="h5 mb-2">${NSAA.escapeHtml(venue.name)}</h2>
                  <p class="nsaa-muted mb-0">${NSAA.escapeHtml(venue.address || venue.city || "Ghana")}</p>
                </article>
              </a>
            </div>
          `,
          )
          .join("")}</div>`;
      }

      function renderDetail(data) {
        if (!data) {
          root.innerHTML = NSAA.emptyState("Venue not found", "This venue profile may not have published events yet.", '<a class="btn btn-nsaa" href="/venues">All venues</a>');
          return;
        }
        const { profile, events } = data;
        const mapUrl = profile.mapUrl || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${profile.name} ${profile.address || profile.city} Ghana`)}`;
        root.innerHTML = `
          <section class="nsaa-panel mb-4">
            <div class="d-flex flex-column flex-lg-row justify-content-between gap-3">
              <div>
                <span class="nsaa-chip mb-3">${profile.verified ? "Verified venue" : "Venue profile"}</span>
                <h1 class="nsaa-section-title mb-2">${NSAA.escapeHtml(profile.name)}</h1>
                <p class="nsaa-muted mb-0">${NSAA.escapeHtml(profile.address || profile.city || "Ghana")}</p>
              </div>
              <a class="btn btn-outline-nsaa align-self-lg-start" href="${NSAA.escapeAttr(mapUrl)}" target="_blank" rel="noreferrer">Open map</a>
            </div>
          </section>
          <h2 class="h4 mb-3">Upcoming events</h2>
          <div class="row g-4">${events.length ? events.map((event, index) => NSAA.eventCard(event, { colClass: "col-md-6 col-xl-4", index })).join("") : `<div class="col-12">${NSAA.emptyState("No upcoming events", "Check back when this venue publishes its next event.")}</div>`}</div>
        `;
      }

      if (!NSAA.isConvexConfigured()) {
        root.innerHTML = NSAA.setupNotice("Venues");
      } else {
        const client = new ConvexClient(NSAA.CONVEX_URL);
        if (slug) {
          client.onUpdate("events:getVenueProfile", { slug }, renderDetail);
        } else {
          client.onUpdate("events:listVenueProfiles", {}, renderList);
        }
      }
    </script>
    <script src="js/clerk-nav.js"></script>
  </body>
</html>

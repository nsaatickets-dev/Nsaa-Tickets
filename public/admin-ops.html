<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="only light" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/jpeg" href="/fav.jpg" />
    <link rel="apple-touch-icon" href="/fav.jpg" />
    <script type="module" src="js/nsaa-chrome.js"></script>
    <title>Admin console | Nsaa Tickets</title>
    <meta name="robots" content="noindex" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div id="nsaa-chrome-nav"></div>

    <script src="js/clerk-config.js"></script>
    <script src="js/clerk-loader.js"></script>

    <main class="container py-5" style="max-width: 1280px">
      <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-end gap-3 mb-4">
        <div>
          <h1 class="nsaa-section-title mb-1">Admin console</h1>
          <p class="nsaa-muted mb-0">God Mode: every action below is logged with your name and a reason.</p>
        </div>
        <nav id="admin-tabs" class="d-flex flex-wrap gap-2"></nav>
      </div>
      <div id="admin-result" class="mb-3"></div>
      <div id="admin-root"></div>
    </main>

    <div id="nsaa-chrome-footer"></div>

    <script src="js/convex-config.js"></script>
    <script src="js/nsaa.js"></script>
    <script type="module">
      import { ConvexClient } from "https://esm.sh/convex/browser";

      const root = document.getElementById("admin-root");
      const resultEl = document.getElementById("admin-result");
      const tabsEl = document.getElementById("admin-tabs");

      const TABS = [
        ["overview", "Overview"],
        ["events", "Events"],
        ["orders", "Orders"],
        ["tickets", "Tickets"],
        ["organizers", "Organizers"],
        ["payouts", "Payouts"],
        ["serviceFees", "Fees"],
        ["blocklist", "Blocklist"],
        ["audit", "Audit log"],
      ];

      let client = null;
      let activeTab = "overview";
      let moolreRatePercent = Number(window.localStorage.getItem("nsaa:moolreRatePercent")) || 0;

      function round2(value) {
        return Math.round(value * 100) / 100;
      }

      // Every destructive God Mode action requires a reason before it's
      // sent - this is the one shared gate for all of them, native
      // browser prompt rather than a custom modal (matches the
      // window.confirm pattern this page already used for cancellation).
      function reasonPrompt(actionLabel) {
        const value = window.prompt(`Reason for: ${actionLabel}\n\nThis is recorded in the audit log.`);
        if (value === null) return null;
        const trimmed = value.trim();
        if (!trimmed) {
          window.alert("A reason is required - action cancelled.");
          return null;
        }
        return trimmed;
      }

      function showError(err) {
        resultEl.innerHTML = NSAA.errorState("Action failed", err?.message || "Please try again.");
      }

      function showSuccess(message) {
        resultEl.innerHTML = `<div class="nsaa-status-box success"><p class="mb-0">${NSAA.escapeHtml(message)}</p></div>`;
      }

      function statusChip(status) {
        const tone =
          status === "paid" || status === "published" || status === "accepted"
            ? "green"
            : status === "refunded" || status === "failed" || status === "cancelled" || status === "void" || status === "rejected"
              ? "rose"
              : "";
        return `<span class="nsaa-chip"${tone ? ` data-tone="${tone}"` : ""}>${NSAA.escapeHtml(status)}</span>`;
      }

      // ---- Tab bar ----
      function renderTabs() {
        tabsEl.innerHTML = TABS.map(
          ([key, label]) =>
            `<button type="button" class="btn btn-nsaa btn-sm admin-tab-btn ${key === activeTab ? "active" : ""}" data-tab="${key}">${label}</button>`,
        ).join("");
      }

      tabsEl.addEventListener("click", (event) => {
        const button = event.target.closest(".admin-tab-btn");
        if (!button) return;
        activeTab = button.dataset.tab;
        resultEl.innerHTML = "";
        renderTabs();
        renderActiveTab();
      });

      function renderActiveTab() {
        const renderers = {
          overview: renderOverviewTab,
          events: renderEventsTab,
          orders: renderOrdersTab,
          tickets: renderTicketsTab,
          organizers: renderOrganizersTab,
          payouts: renderPayoutsTab,
          serviceFees: renderServiceFeesTab,
          blocklist: renderBlocklistTab,
          audit: renderAuditTab,
        };
        renderers[activeTab]();
      }

      // ---- Overview ----
      const REVENUE_WINDOWS = [
        ["Today", "today"],
        ["Last 7 days", "last7Days"],
        ["Last 30 days", "last30Days"],
        ["All time", "allTime"],
      ];

      function labelize(value) {
        return String(value || "")
          .replaceAll("-", " ")
          .replace(/\b\w/g, (char) => char.toUpperCase());
      }

      function inquiryDetails(item) {
        const bits = [item.payoutReadiness ? `Payout: ${labelize(item.payoutReadiness)}` : ""].filter(Boolean);
        return bits.length ? `<p class="nsaa-muted small mb-1">${bits.map(NSAA.escapeHtml).join(" &middot; ")}</p>` : "";
      }

      function inquiryContactLine(item) {
        return [item.contactName, item.phone, item.email].filter(Boolean).map(NSAA.escapeHtml).join(" &middot; ");
      }

      function supportNeedsHtml(item) {
        if (!item.supportNeeds || item.supportNeeds.length === 0) return "";
        return `<div class="d-flex flex-wrap gap-1 mb-2">${item.supportNeeds.map((need) => `<span class="nsaa-chip">${NSAA.escapeHtml(need)}</span>`).join("")}</div>`;
      }

      function renderTriagePanels(data) {
        return `
          <div class="col-xl-6">
            <div class="nsaa-panel h-100">
              <h2 class="h5 mb-3">Organizer signups</h2>
              <div class="d-grid gap-2">
                ${data.organizerInquiries.map((item) => `
                  <article class="nsaa-meta-item">
                    <div class="d-flex justify-content-between gap-3 mb-2">
                      <strong>${NSAA.escapeHtml(item.organizerName)}</strong>
                      ${statusSelect(item.status, "inquiry", item._id)}
                    </div>
                    <p class="nsaa-muted small mb-1">${inquiryContactLine(item)}</p>
                    ${inquiryDetails(item)}
                    ${item.websiteUrl ? `<p class="nsaa-muted small mb-1"><a href="${NSAA.escapeAttr(item.websiteUrl)}" target="_blank" rel="noreferrer">${NSAA.escapeHtml(item.websiteUrl)}</a></p>` : ""}
                    ${supportNeedsHtml(item)}
                    <p class="mb-0 small">${NSAA.escapeHtml(item.message)}</p>
                  </article>
                `).join("") || '<p class="nsaa-muted mb-0">No inquiries.</p>'}
              </div>
            </div>
          </div>
          <div class="col-xl-6">
            <div class="nsaa-panel h-100">
              <h2 class="h5 mb-3">Support messages</h2>
              <div class="d-grid gap-2">
                ${data.contactMessages.map((item) => `
                  <article class="nsaa-meta-item">
                    <div class="d-flex justify-content-between gap-3 mb-2">
                      <strong>${NSAA.escapeHtml(item.name)}</strong>
                      ${statusSelect(item.status, "contact", item._id)}
                    </div>
                    <p class="nsaa-muted small mb-1">${NSAA.escapeHtml(item.email)} &middot; ${NSAA.escapeHtml(item.topic)}</p>
                    <p class="mb-0 small">${NSAA.escapeHtml(item.message)}</p>
                  </article>
                `).join("") || '<p class="nsaa-muted mb-0">No messages.</p>'}
              </div>
            </div>
          </div>
        `;
      }

      async function renderOverviewTab() {
        root.innerHTML = NSAA.loading("Loading overview");
        try {
          const [revenue, stats, overviewData] = await Promise.all([
            client.query("ops:revenueSummary", {}),
            client.query("ops:opsStats", {}),
            client.query("ops:overview", {}),
          ]);

          root.innerHTML = `
            <div class="row g-4">
              <div class="col-12">
                <div class="row g-3">
                  <div class="col-md-4">
                    <div class="nsaa-panel">
                      <p class="nsaa-faint small text-uppercase mb-1">Reserved, awaiting payment</p>
                      <p class="nsaa-page-title mb-0" style="font-size: 2rem;">${stats.reservedCount}</p>
                    </div>
                  </div>
                  <div class="col-md-4">
                    <div class="nsaa-panel">
                      <p class="nsaa-faint small text-uppercase mb-1">Scans today</p>
                      <p class="nsaa-page-title mb-0" style="font-size: 2rem;">${stats.scansToday}</p>
                    </div>
                  </div>
                  <div class="col-md-4">
                    <div class="nsaa-panel">
                      <p class="nsaa-faint small text-uppercase mb-1">Accepted scans today</p>
                      <p class="nsaa-page-title mb-0" style="font-size: 2rem;">${stats.acceptedScansToday}</p>
                    </div>
                  </div>
                </div>
              </div>
              <div class="col-12">
                <div class="nsaa-panel">
                  <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-3">
                    <h2 class="h5 mb-0">Revenue</h2>
                    <div class="d-flex align-items-center gap-2">
                      <label class="nsaa-muted small mb-0" for="moolre-rate">Moolre's fee (% of amount collected)</label>
                      <input id="moolre-rate" class="form-control form-control-nsaa form-control-sm" style="width: 90px" type="number" min="0" step="0.01" value="${moolreRatePercent}" />
                    </div>
                  </div>
                  <div class="table-responsive">
                    <table class="table align-middle mb-0">
                      <thead>
                        <tr>
                          <th>Window</th>
                          <th class="text-end">Paid orders</th>
                          <th class="text-end">Ticket subtotal (organizer)</th>
                          <th class="text-end">Service fees (gross)</th>
                          <th class="text-end">Total collected</th>
                          <th class="text-end">Est. Moolre cut</th>
                          <th class="text-end">Est. net to Nsaa</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${REVENUE_WINDOWS.map(([label, key]) => {
                          const w = revenue[key];
                          const moolreCut = round2(w.totalGHS * (moolreRatePercent / 100));
                          const net = round2(w.serviceFeeGHS - moolreCut);
                          return `
                            <tr>
                              <td>${label}</td>
                              <td class="text-end">${w.orders}</td>
                              <td class="text-end">${NSAA.money(w.ticketSubtotalGHS)}</td>
                              <td class="text-end">${NSAA.money(w.serviceFeeGHS)}</td>
                              <td class="text-end">${NSAA.money(w.totalGHS)}</td>
                              <td class="text-end moolre-cut-cell" data-total="${w.totalGHS}">${NSAA.money(moolreCut)}</td>
                              <td class="text-end fw-semibold net-cell" data-total="${w.totalGHS}" data-fee="${w.serviceFeeGHS}">${NSAA.money(net)}</td>
                            </tr>
                          `;
                        }).join("")}
                      </tbody>
                    </table>
                  </div>
                  <p class="nsaa-faint small mt-3 mb-0">
                    Ticket subtotal, service fees, and totals above are exact (from paid orders). Moolre's cut and the net
                    figure are estimates - set the real rate from your Moolre merchant agreement above.
                  </p>
                </div>
              </div>
              ${renderTriagePanels(overviewData)}
            </div>
          `;
        } catch (err) {
          root.innerHTML = "";
          showError(err);
        }
      }

      root.addEventListener("input", (event) => {
        const rateInput = event.target.closest("#moolre-rate");
        if (!rateInput) return;
        moolreRatePercent = Number(rateInput.value) || 0;
        window.localStorage.setItem("nsaa:moolreRatePercent", String(moolreRatePercent));
        root.querySelectorAll(".moolre-cut-cell").forEach((cell) => {
          cell.textContent = NSAA.money(round2(Number(cell.dataset.total) * (moolreRatePercent / 100)));
        });
        root.querySelectorAll(".net-cell").forEach((cell) => {
          const moolreCut = round2(Number(cell.dataset.total) * (moolreRatePercent / 100));
          cell.textContent = NSAA.money(round2(Number(cell.dataset.fee) - moolreCut));
        });
      });

      // ---- Events ----
      let eventsCache = [];

      function statusSelect(current, kind, id) {
        return `
          <select class="form-select form-select-nsaa form-select-sm admin-status" data-kind="${NSAA.escapeAttr(kind)}" data-id="${NSAA.escapeAttr(id)}">
            ${["new", "contacted", "closed"].map((status) => `<option value="${status}" ${status === current ? "selected" : ""}>${status}</option>`).join("")}
          </select>
        `;
      }

      function eventEditFormHtml(event) {
        return `
          <tr class="admin-event-edit-row" data-event-id="${NSAA.escapeAttr(event._id)}">
            <td colspan="5">
              <div class="nsaa-panel p-3">
                <div class="row g-2">
                  <div class="col-md-6"><label class="nsaa-muted small">Title</label><input class="form-control form-control-nsaa form-control-sm ee-title" value="${NSAA.escapeAttr(event.title)}" /></div>
                  <div class="col-md-6"><label class="nsaa-muted small">Venue</label><input class="form-control form-control-nsaa form-control-sm ee-venue" value="${NSAA.escapeAttr(event.venue)}" /></div>
                  <div class="col-md-6"><label class="nsaa-muted small">Address</label><input class="form-control form-control-nsaa form-control-sm ee-address" value="${NSAA.escapeAttr(event.address)}" /></div>
                  <div class="col-md-6"><label class="nsaa-muted small">City</label><input class="form-control form-control-nsaa form-control-sm ee-city" value="${NSAA.escapeAttr(event.city)}" /></div>
                  <div class="col-md-6">
                    <label class="nsaa-muted small">Ends at</label>
                    <input class="form-control form-control-nsaa form-control-sm ee-ends" type="datetime-local" value="${event.endsAt ? new Date(event.endsAt).toISOString().slice(0, 16) : ""}" />
                    <p class="nsaa-faint small mt-1 mb-0">Payout eligibility is gated on this - fix it here for events created before end time was required.</p>
                  </div>
                  <div class="col-md-6"><label class="nsaa-muted small">Payout phone</label><input class="form-control form-control-nsaa form-control-sm ee-payout-phone" value="${NSAA.escapeAttr(event.organizerPayoutPhone || "")}" /></div>
                  <div class="col-md-6"><label class="nsaa-muted small">Reassign owner (Clerk user id)</label><input class="form-control form-control-nsaa form-control-sm ee-owner" value="${NSAA.escapeAttr(event.organizerClerkUserId || "")}" /></div>
                </div>
                <div class="d-flex gap-2 mt-3">
                  <button class="btn btn-nsaa btn-sm admin-event-save" type="button">Save changes</button>
                  <button class="btn btn-nsaa btn-sm admin-event-cancel-edit" type="button">Close</button>
                </div>
              </div>
            </td>
          </tr>
        `;
      }

      function eventRowHtml(event, editing) {
        return `
          <tr data-event-id="${NSAA.escapeAttr(event._id)}">
            <td>
              <strong>${NSAA.escapeHtml(event.title)}</strong>
              <div class="nsaa-muted small">${NSAA.escapeHtml(event.venue)}, ${NSAA.escapeHtml(event.city)}</div>
            </td>
            <td>${statusChip(event.status)}</td>
            <td>${NSAA.escapeHtml(event.organizerName)}</td>
            <td>${NSAA.escapeHtml(NSAA.formatDate(event.startsAt))}</td>
            <td class="text-end">
              <div class="btn-group btn-group-sm flex-wrap">
                <button class="btn btn-nsaa admin-event-action" data-action="publish" type="button">Publish</button>
                <button class="btn btn-nsaa admin-event-action" data-action="draft" type="button">Draft</button>
                <button class="btn btn-nsaa admin-event-action" data-action="edit" type="button">Edit</button>
                <button class="btn btn-nsaa admin-event-action" data-action="cancel" type="button">Cancel/refund</button>
                <button class="btn btn-nsaa admin-event-action" data-action="payout" type="button">Payout</button>
              </div>
            </td>
          </tr>
          ${editing ? eventEditFormHtml(event) : ""}
        `;
      }

      let editingEventId = null;

      function renderEventsSection() {
        return `
          <div class="nsaa-panel">
            <h2 class="h5 mb-3">Event moderation and payouts</h2>
            <div class="table-responsive">
              <table class="table align-middle mb-0">
                <thead>
                  <tr><th>Event</th><th>Status</th><th>Organizer</th><th>Date</th><th class="text-end">Actions</th></tr>
                </thead>
                <tbody>
                  ${eventsCache.map((event) => eventRowHtml(event, event._id === editingEventId)).join("")}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      async function loadEvents() {
        const data = await client.query("ops:overview", {});
        eventsCache = data.events;
      }

      async function renderEventsTab() {
        root.innerHTML = NSAA.loading("Loading events");
        try {
          await loadEvents();
          root.innerHTML = renderEventsSection();
        } catch (err) {
          root.innerHTML = "";
          showError(err);
        }
      }

      root.addEventListener("click", async (event) => {
        const editBtn = event.target.closest(".admin-event-action[data-action='edit']");
        if (editBtn && activeTab === "events") {
          editingEventId = editBtn.closest("[data-event-id]").dataset.eventId;
          root.innerHTML = renderEventsSection();
          return;
        }
        const closeEdit = event.target.closest(".admin-event-cancel-edit");
        if (closeEdit) {
          editingEventId = null;
          root.innerHTML = renderEventsSection();
          return;
        }

        const saveBtn = event.target.closest(".admin-event-save");
        if (saveBtn) {
          const row = saveBtn.closest("[data-event-id]");
          const eventId = row.dataset.eventId;
          const reason = reasonPrompt("Edit event fields");
          if (!reason) return;
          saveBtn.disabled = true;
          try {
            await client.mutation("ops:adminUpdateEventFields", {
              eventId,
              reason,
              title: row.querySelector(".ee-title").value,
              venue: row.querySelector(".ee-venue").value,
              address: row.querySelector(".ee-address").value,
              city: row.querySelector(".ee-city").value,
              endsAt: row.querySelector(".ee-ends").value
                ? new Date(row.querySelector(".ee-ends").value).getTime()
                : undefined,
              organizerPayoutPhone: row.querySelector(".ee-payout-phone").value || undefined,
              organizerClerkUserId: row.querySelector(".ee-owner").value || undefined,
            });
            showSuccess("Event updated.");
            editingEventId = null;
            await loadEvents();
            root.innerHTML = renderEventsSection();
          } catch (err) {
            showError(err);
          } finally {
            saveBtn.disabled = false;
          }
          return;
        }

        const actionBtn = event.target.closest(".admin-event-action");
        if (actionBtn && actionBtn.dataset.action !== "edit") {
          const row = actionBtn.closest("[data-event-id]");
          const eventId = row.dataset.eventId;
          actionBtn.disabled = true;
          try {
            if (actionBtn.dataset.action === "publish" || actionBtn.dataset.action === "draft") {
              await client.mutation("ops:setEventStatusAdmin", {
                eventId,
                status: actionBtn.dataset.action === "publish" ? "published" : "draft",
              });
            }
            if (actionBtn.dataset.action === "cancel") {
              const reason = reasonPrompt("Cancel event and mark paid orders refunded/void tickets");
              if (!reason) return;
              if (!window.confirm("Cancel this event and mark paid orders as refunded/void tickets?")) return;
              await client.mutation("ops:cancelEventAndMarkRefunded", { eventId, reason });
            }
            if (actionBtn.dataset.action === "payout") {
              const overrideRaw = window.prompt("Override payout amount in GHS (leave blank to use the computed eligible amount):");
              if (overrideRaw === null) return;
              const overrideAmountGHS = overrideRaw.trim() ? Number(overrideRaw.trim()) : undefined;
              if (overrideAmountGHS !== undefined && (!Number.isFinite(overrideAmountGHS) || overrideAmountGHS <= 0)) {
                window.alert("Enter a payout amount greater than 0, or leave it blank.");
                return;
              }
              await client.mutation("payouts:queueOrganizerPayout", { eventId, overrideAmountGHS });
              showSuccess("Payout queued. The transfer now runs server-side; check the Payouts tab for status.");
            }
            await loadEvents();
            root.innerHTML = renderEventsSection();
          } catch (err) {
            showError(err);
          } finally {
            actionBtn.disabled = false;
          }
        }
      });

      root.addEventListener("change", async (event) => {
        const select = event.target.closest(".admin-status");
        if (!select) return;
        try {
          if (select.dataset.kind === "inquiry") {
            await client.mutation("ops:setOrganizerInquiryStatus", { inquiryId: select.dataset.id, status: select.value });
          } else {
            await client.mutation("ops:setContactMessageStatus", { messageId: select.dataset.id, status: select.value });
          }
        } catch (err) {
          showError(err);
        }
      });

      // ---- Orders ----
      function orderRowHtml(entry) {
        const { order, ticketType } = entry;
        const actions = [];
        if (order.status === "reserved") {
          actions.push(`<button class="btn btn-nsaa admin-order-action" data-action="forcePaid" type="button">Force paid</button>`);
          actions.push(`<button class="btn btn-nsaa admin-order-action" data-action="forceExpire" type="button">Force expire</button>`);
        }
        if (order.status === "paid" && order.refundStatus !== "pending") {
          actions.push(`<button class="btn btn-nsaa admin-order-action" data-action="refund" type="button">Refund</button>`);
        }
        return `
          <tr data-order-id="${NSAA.escapeAttr(order._id)}" data-total="${order.totalGHS}" data-subtotal="${order.ticketSubtotalGHS}">
            <td>
              <div class="small nsaa-faint">${NSAA.escapeHtml(order._id)}</div>
              <strong>${NSAA.escapeHtml(order.buyerName)}</strong>
              <div class="nsaa-muted small">${NSAA.escapeHtml(order.buyerPhone)} &middot; ${NSAA.escapeHtml(order.buyerEmail)}</div>
            </td>
            <td>${NSAA.escapeHtml(ticketType?.name || "-")} &times; ${order.quantity}</td>
            <td>${statusChip(order.status)}${order.refundStatus ? `<div class="small nsaa-faint mt-1">refund: ${NSAA.escapeHtml(order.refundStatus)}</div>` : ""}</td>
            <td class="text-end">${NSAA.money(order.totalGHS)}</td>
            <td class="text-end"><div class="btn-group btn-group-sm flex-wrap">${actions.join("") || '<span class="nsaa-faint small">-</span>'}</div></td>
          </tr>
        `;
      }

      function ordersTableHtml(entries) {
        return `
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead><tr><th>Order / Buyer</th><th>Tickets</th><th>Status</th><th class="text-end">Total</th><th class="text-end">Actions</th></tr></thead>
              <tbody>${entries.length ? entries.map(orderRowHtml).join("") : '<tr><td colspan="5" class="nsaa-muted">No orders found.</td></tr>'}</tbody>
            </table>
          </div>
        `;
      }

      async function renderOrdersTab() {
        root.innerHTML = `
          <div class="nsaa-panel">
            <h2 class="h5 mb-3">Find orders</h2>
            <form id="order-search-form" class="row g-2 mb-3">
              <div class="col-md-3"><input class="form-control form-control-nsaa form-control-sm" id="order-search-id" placeholder="Order id (exact)" /></div>
              <div class="col-md-3"><input class="form-control form-control-nsaa form-control-sm" id="order-search-phone" placeholder="Buyer phone contains" /></div>
              <div class="col-md-3"><input class="form-control form-control-nsaa form-control-sm" id="order-search-email" placeholder="Buyer email contains" /></div>
              <div class="col-md-3"><button class="btn btn-nsaa btn-sm w-100" type="submit">Search</button></div>
            </form>
            <div id="orders-results"><p class="nsaa-muted mb-0">Search by order id, phone, or email to see results.</p></div>
          </div>
        `;

        document.getElementById("order-search-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const resultsEl = document.getElementById("orders-results");
          const orderId = document.getElementById("order-search-id").value.trim();
          const phone = document.getElementById("order-search-phone").value.trim();
          const email = document.getElementById("order-search-email").value.trim();

          resultsEl.innerHTML = NSAA.loading("Searching");
          try {
            if (orderId) {
              const found = await client.query("tickets:adminFindOrder", { orderId });
              resultsEl.innerHTML = found ? ordersTableHtml([found]) : '<p class="nsaa-muted mb-0">No order with that id.</p>';
            } else {
              const orders = await client.query("tickets:adminSearchOrders", {
                phone: phone || undefined,
                email: email || undefined,
              });
              resultsEl.innerHTML = ordersTableHtml(orders.map((order) => ({ order, ticketType: null })));
            }
          } catch (err) {
            resultsEl.innerHTML = "";
            showError(err);
          }
        });
      }

      root.addEventListener("click", async (event) => {
        const actionBtn = event.target.closest(".admin-order-action");
        if (!actionBtn || activeTab !== "orders") return;
        const row = actionBtn.closest("[data-order-id]");
        const orderId = row.dataset.orderId;
        const action = actionBtn.dataset.action;

        try {
          if (action === "forcePaid") {
            const reason = reasonPrompt("Force-mark this order as paid");
            if (!reason) return;
            actionBtn.disabled = true;
            await client.mutation("ordersAdmin:adminForceMarkOrderPaid", { orderId, reason });
            showSuccess("Order marked paid and tickets issued.");
          } else if (action === "forceExpire") {
            const reason = reasonPrompt("Force-expire this reservation");
            if (!reason) return;
            actionBtn.disabled = true;
            await client.mutation("ordersAdmin:adminForceExpireOrder", { orderId, reason });
            showSuccess("Reservation expired and inventory released.");
          } else if (action === "refund") {
            const defaultAmount = row.dataset.subtotal;
            const amountRaw = window.prompt(
              `Refund amount in GHS (ticket subtotal only, by policy - the service fee stays with the platform). Max ${row.dataset.total} GHS.`,
              defaultAmount,
            );
            if (amountRaw === null) return;
            const amountGHS = Number(amountRaw.trim());
            if (!Number.isFinite(amountGHS) || amountGHS <= 0) {
              window.alert("Enter a valid amount.");
              return;
            }
            const reason = reasonPrompt(`Refund ${amountGHS} GHS to buyer`);
            if (!reason) return;
            if (!window.confirm(`Send a real Moolre transfer of GHS ${amountGHS} to this buyer?`)) return;
            actionBtn.disabled = true;
            await client.action("ordersAdmin:adminRefundOrder", { orderId, amountGHS, reason });
            showSuccess("Refund transfer initiated - it will confirm once Moolre verifies it.");
          } else {
            return;
          }
          row.remove();
        } catch (err) {
          showError(err);
        } finally {
          actionBtn.disabled = false;
        }
      });

      // ---- Tickets ----
      function ticketDetailHtml(data) {
        const { ticket, order, scanLogs } = data;
        const actions = [];
        if (ticket.status !== "void") actions.push(`<button class="btn btn-nsaa admin-ticket-action" data-action="void" type="button">Void</button>`);
        if (ticket.status === "valid") actions.push(`<button class="btn btn-nsaa admin-ticket-action" data-action="reissue" type="button">Reissue QR</button>`);
        if (ticket.status === "used") actions.push(`<button class="btn btn-nsaa admin-ticket-action" data-action="unscan" type="button">Undo scan</button>`);

        return `
          <div class="nsaa-panel" data-ticket-id="${NSAA.escapeAttr(ticket._id)}">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div>
                <strong>${NSAA.escapeHtml(ticket.ownerName)}</strong>
                <div class="nsaa-muted small">${NSAA.escapeHtml(ticket.ownerPhone)}</div>
                <div class="nsaa-faint small mt-1">Order: ${NSAA.escapeHtml(ticket.orderId)}</div>
              </div>
              ${statusChip(ticket.status)}
            </div>
            <div class="btn-group btn-group-sm mb-3">${actions.join("") || '<span class="nsaa-faint small">No actions available</span>'}</div>
            <h3 class="h6 mb-2">Scan history</h3>
            ${
              scanLogs.length
                ? `<ul class="list-unstyled d-grid gap-1 mb-0">${scanLogs
                    .map(
                      (log) =>
                        `<li class="small">${NSAA.escapeHtml(NSAA.formatDate(log.createdAt))} - ${statusChip(log.outcome)} ${NSAA.escapeHtml(log.reason || "")} ${NSAA.escapeHtml(log.gateLabel || "")}</li>`,
                    )
                    .join("")}</ul>`
                : '<p class="nsaa-muted small mb-0">No scans yet.</p>'
            }
          </div>
        `;
      }

      async function renderTicketsTab() {
        root.innerHTML = `
          <div class="nsaa-panel">
            <h2 class="h5 mb-3">Find a ticket</h2>
            <form id="ticket-search-form" class="d-flex gap-2 mb-3">
              <input class="form-control form-control-nsaa form-control-sm" id="ticket-search-id" placeholder="Ticket id" />
              <button class="btn btn-nsaa btn-sm" type="submit">Search</button>
            </form>
            <div id="ticket-result"><p class="nsaa-muted mb-0">Paste a ticket id (from an order's ticket list or a scan log) to look it up.</p></div>
          </div>
        `;

        document.getElementById("ticket-search-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const resultEl2 = document.getElementById("ticket-result");
          const ticketId = document.getElementById("ticket-search-id").value.trim();
          if (!ticketId) return;
          resultEl2.innerHTML = NSAA.loading("Searching");
          try {
            const data = await client.query("tickets:adminFindTicket", { ticketId });
            resultEl2.innerHTML = data ? ticketDetailHtml(data) : '<p class="nsaa-muted mb-0">No ticket with that id.</p>';
          } catch (err) {
            resultEl2.innerHTML = "";
            showError(err);
          }
        });
      }

      root.addEventListener("click", async (event) => {
        const actionBtn = event.target.closest(".admin-ticket-action");
        if (!actionBtn || activeTab !== "tickets") return;
        const panel = actionBtn.closest("[data-ticket-id]");
        const ticketId = panel.dataset.ticketId;
        const action = actionBtn.dataset.action;
        const labels = { void: "Void this ticket", reissue: "Reissue this ticket's QR code", unscan: "Undo this ticket's scan" };
        const reason = reasonPrompt(labels[action]);
        if (!reason) return;
        actionBtn.disabled = true;
        try {
          const fn = { void: "adminVoidTicket", reissue: "adminReissueTicket", unscan: "adminUnscanTicket" }[action];
          await client.mutation(`tickets:${fn}`, { ticketId, reason });
          showSuccess("Done.");
          const data = await client.query("tickets:adminFindTicket", { ticketId });
          panel.outerHTML = ticketDetailHtml(data);
        } catch (err) {
          showError(err);
        } finally {
          actionBtn.disabled = false;
        }
      });

      // ---- Organizers ----
      const TIER_OPTIONS = ["free", "essential", "pro", "custom"];

      function organizerRowHtml(org) {
        return `
          <tr data-organizer-id="${NSAA.escapeAttr(org.organizerClerkUserId)}">
            <td>
              <strong>${NSAA.escapeHtml(org.displayName)}</strong>
              <div class="nsaa-faint small">${NSAA.escapeHtml(org.organizerClerkUserId)}</div>
              ${org.suspended ? `<div class="small" style="color: var(--nsaa-danger);">Suspended: ${NSAA.escapeHtml(org.suspendedReason || "")}</div>` : ""}
            </td>
            <td>${org.eventCount}</td>
            <td>
              <select class="form-select form-select-nsaa form-select-sm admin-org-tier">
                ${TIER_OPTIONS.map((t) => `<option value="${t}" ${t === org.tier ? "selected" : ""}>${t}</option>`).join("")}
              </select>
            </td>
            <td class="text-end">
              <button class="btn btn-nsaa btn-sm admin-org-suspend" data-suspend="${org.suspended ? "0" : "1"}" type="button">
                ${org.suspended ? "Unsuspend" : "Suspend"}
              </button>
            </td>
          </tr>
        `;
      }

      async function renderOrganizersTab() {
        root.innerHTML = NSAA.loading("Loading organizers");
        try {
          const organizers = await client.query("events:adminListOrganizers", {});
          root.innerHTML = `
            <div class="nsaa-panel">
              <h2 class="h5 mb-3">Organizers</h2>
              <div class="table-responsive">
                <table class="table align-middle mb-0">
                  <thead><tr><th>Organizer</th><th>Events</th><th>Fee tier</th><th class="text-end">Actions</th></tr></thead>
                  <tbody>${organizers.map(organizerRowHtml).join("") || '<tr><td colspan="4" class="nsaa-muted">No organizers yet.</td></tr>'}</tbody>
                </table>
              </div>
            </div>
          `;
        } catch (err) {
          root.innerHTML = "";
          showError(err);
        }
      }

      root.addEventListener("change", async (event) => {
        const select = event.target.closest(".admin-org-tier");
        if (!select) return;
        const organizerClerkUserId = select.closest("[data-organizer-id]").dataset.organizerId;
        try {
          await client.mutation("events:setOrganizerTierAdmin", { organizerClerkUserId, tier: select.value });
          showSuccess("Tier updated.");
        } catch (err) {
          showError(err);
        }
      });

      root.addEventListener("click", async (event) => {
        const button = event.target.closest(".admin-org-suspend");
        if (!button) return;
        const organizerClerkUserId = button.closest("[data-organizer-id]").dataset.organizerId;
        const suspending = button.dataset.suspend === "1";
        const reason = reasonPrompt(suspending ? "Suspend this organizer" : "Unsuspend this organizer");
        if (!reason) return;
        button.disabled = true;
        try {
          await client.mutation("events:adminSetOrganizerSuspension", {
            organizerClerkUserId,
            suspended: suspending,
            reason,
          });
          await renderOrganizersTab();
        } catch (err) {
          showError(err);
        } finally {
          button.disabled = false;
        }
      });

      // ---- Payouts ----
      function payoutRowHtml(payout) {
        const actions =
          payout.status === "pending"
            ? [
                `<button class="btn btn-nsaa admin-payout-action" data-action="paid" type="button">Mark paid</button>`,
                `<button class="btn btn-nsaa admin-payout-action" data-action="failed" type="button">Mark failed</button>`,
              ]
            : [];
        return `
          <tr data-payout-id="${NSAA.escapeAttr(payout._id)}">
            <td>${NSAA.escapeHtml(payout.eventId)}</td>
            <td>${NSAA.escapeHtml(payout.organizerPayoutPhone)}</td>
            <td class="text-end">${NSAA.money(payout.amountGHS)}</td>
            <td>${statusChip(payout.status)}</td>
            <td>${NSAA.escapeHtml(NSAA.formatDate(payout.createdAt))}</td>
            <td class="text-end"><div class="btn-group btn-group-sm">${actions.join("") || "-"}</div></td>
          </tr>
        `;
      }

      async function renderPayoutsTab() {
        root.innerHTML = NSAA.loading("Loading payouts");
        try {
          const data = await client.query("ops:overview", {});
          root.innerHTML = `
            <div class="nsaa-panel">
              <h2 class="h5 mb-3">Payouts</h2>
              <p class="nsaa-muted small">Payouts are scheduled automatically for the event end time, with a one-minute safety sweep. Moolre transfers the organizer's cut and the service fee stays with Nsaa. Use the Events tab only to queue an exceptional on-demand retry, and the override actions below only for out-of-band settlement.</p>
              <div class="table-responsive">
                <table class="table align-middle mb-0">
                  <thead><tr><th>Event</th><th>Payout phone</th><th class="text-end">Amount</th><th>Status</th><th>Date</th><th class="text-end">Override</th></tr></thead>
                  <tbody>${data.payouts.map(payoutRowHtml).join("") || '<tr><td colspan="6" class="nsaa-muted">No payouts yet.</td></tr>'}</tbody>
                </table>
              </div>
            </div>
          `;
        } catch (err) {
          root.innerHTML = "";
          showError(err);
        }
      }

      root.addEventListener("click", async (event) => {
        const button = event.target.closest(".admin-payout-action");
        if (!button) return;
        const payoutId = button.closest("[data-payout-id]").dataset.payoutId;
        const status = button.dataset.action;
        const reason = reasonPrompt(`Manually mark this payout as ${status}`);
        if (!reason) return;
        button.disabled = true;
        try {
          await client.mutation("payouts:adminSetPayoutStatus", { payoutId, status, reason });
          await renderPayoutsTab();
        } catch (err) {
          showError(err);
        } finally {
          button.disabled = false;
        }
      });

      // ---- Service fees ----
      function serviceFeeConfigHtml(config) {
        if (config.configured) {
          return `
            <div class="nsaa-status-box success mb-3">
              <p class="mb-0">GCB sweep active: ${NSAA.escapeHtml(config.bankName)} (${NSAA.escapeHtml(config.bankSublistId)}), account ending ${NSAA.escapeHtml(config.bankAccountLast4)}.</p>
            </div>
          `;
        }

        return `
          <div class="nsaa-status-box mb-3">
            <p class="mb-0">GCB sweep is not active yet. Set <code>NSAA_SERVICE_FEE_GCB_ACCOUNT_NUMBER</code> in Convex production env.</p>
          </div>
        `;
      }

      function serviceFeeSummaryHtml(summary) {
        return `
          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <div class="nsaa-panel">
                <p class="nsaa-faint small text-uppercase mb-1">Paid to GCB</p>
                <p class="nsaa-page-title mb-0" style="font-size: 2rem;">${NSAA.money(summary.paidGHS)}</p>
                <p class="nsaa-muted small mb-0">${summary.paidCount} transfer${summary.paidCount === 1 ? "" : "s"}</p>
              </div>
            </div>
            <div class="col-md-4">
              <div class="nsaa-panel">
                <p class="nsaa-faint small text-uppercase mb-1">Pending verification</p>
                <p class="nsaa-page-title mb-0" style="font-size: 2rem;">${NSAA.money(summary.pendingGHS)}</p>
                <p class="nsaa-muted small mb-0">${summary.pendingCount} transfer${summary.pendingCount === 1 ? "" : "s"}</p>
              </div>
            </div>
            <div class="col-md-4">
              <div class="nsaa-panel">
                <p class="nsaa-faint small text-uppercase mb-1">Failed</p>
                <p class="nsaa-page-title mb-0" style="font-size: 2rem;">${NSAA.money(summary.failedGHS)}</p>
                <p class="nsaa-muted small mb-0">${summary.failedCount} transfer${summary.failedCount === 1 ? "" : "s"}</p>
              </div>
            </div>
          </div>
        `;
      }

      function serviceFeeTransferRowHtml(transfer) {
        const actions =
          transfer.status === "failed"
            ? [`<button class="btn btn-nsaa admin-service-fee-action" type="button">Retry</button>`]
            : [];
        return `
          <tr data-order-id="${NSAA.escapeAttr(transfer.orderId)}">
            <td>
              <strong>${NSAA.escapeHtml(transfer.orderId)}</strong>
              ${transfer.failureReason ? `<div class="nsaa-muted small">${NSAA.escapeHtml(transfer.failureReason)}</div>` : ""}
            </td>
            <td>${NSAA.escapeHtml(transfer.eventId)}</td>
            <td>GCB ${NSAA.escapeHtml(transfer.bankSublistId)} ending ${NSAA.escapeHtml(transfer.bankAccountLast4)}</td>
            <td class="text-end">${NSAA.money(transfer.amountGHS)}</td>
            <td>${statusChip(transfer.status)}</td>
            <td>${NSAA.escapeHtml(NSAA.formatDate(transfer.createdAt))}</td>
            <td>${NSAA.escapeHtml(transfer.externalRef || "-")}</td>
            <td class="text-end"><div class="btn-group btn-group-sm">${actions.join("") || "-"}</div></td>
          </tr>
        `;
      }

      async function renderServiceFeesTab() {
        root.innerHTML = NSAA.loading("Loading service fees");
        try {
          const [data, config, summary] = await Promise.all([
            client.query("ops:overview", {}),
            client.query("serviceFees:serviceFeeConfigStatus", {}),
            client.query("serviceFees:serviceFeeTransferSummary", {}),
          ]);
          root.innerHTML = `
            ${serviceFeeConfigHtml(config)}
            ${serviceFeeSummaryHtml(summary)}
            <div class="nsaa-panel">
              <h2 class="h5 mb-3">Service fee transfers</h2>
              <div class="table-responsive">
                <table class="table align-middle mb-0">
                  <thead><tr><th>Order</th><th>Event</th><th>Destination</th><th class="text-end">Amount</th><th>Status</th><th>Created</th><th>Reference</th><th class="text-end">Action</th></tr></thead>
                  <tbody>${data.serviceFeeTransfers.map(serviceFeeTransferRowHtml).join("") || '<tr><td colspan="8" class="nsaa-muted">No service fee transfers yet.</td></tr>'}</tbody>
                </table>
              </div>
            </div>
          `;
        } catch (err) {
          root.innerHTML = "";
          showError(err);
        }
      }

      root.addEventListener("click", async (event) => {
        const button = event.target.closest(".admin-service-fee-action");
        if (!button) return;
        const orderId = button.closest("[data-order-id]").dataset.orderId;
        button.disabled = true;
        try {
          await client.mutation("serviceFees:queueServiceFeeTransfer", { orderId });
          showSuccess("Service fee transfer queued.");
          await renderServiceFeesTab();
        } catch (err) {
          showError(err);
        } finally {
          button.disabled = false;
        }
      });

      // ---- Blocklist ----
      function blocklistRowHtml(entry) {
        return `
          <tr data-blocklist-id="${NSAA.escapeAttr(entry._id)}">
            <td>${NSAA.escapeHtml(entry.phone || "-")}</td>
            <td>${NSAA.escapeHtml(entry.email || "-")}</td>
            <td>${NSAA.escapeHtml(entry.reason)}</td>
            <td>${NSAA.escapeHtml(NSAA.formatDate(entry.createdAt))}</td>
            <td class="text-end"><button class="btn btn-nsaa btn-sm admin-unblock" type="button">Unblock</button></td>
          </tr>
        `;
      }

      async function renderBlocklistTab() {
        root.innerHTML = NSAA.loading("Loading blocklist");
        try {
          const entries = await client.query("buyerBlocklist:listBlocklist", {});
          root.innerHTML = `
            <div class="nsaa-panel mb-4">
              <h2 class="h5 mb-3">Block a buyer</h2>
              <form id="block-form" class="row g-2">
                <div class="col-md-4"><input class="form-control form-control-nsaa form-control-sm" id="block-phone" placeholder="Phone (optional)" /></div>
                <div class="col-md-4"><input class="form-control form-control-nsaa form-control-sm" id="block-email" placeholder="Email (optional)" /></div>
                <div class="col-md-4"><button class="btn btn-nsaa btn-sm w-100" type="submit">Block</button></div>
              </form>
            </div>
            <div class="nsaa-panel">
              <h2 class="h5 mb-3">Blocked buyers</h2>
              <div class="table-responsive">
                <table class="table align-middle mb-0">
                  <thead><tr><th>Phone</th><th>Email</th><th>Reason</th><th>Blocked</th><th class="text-end">Actions</th></tr></thead>
                  <tbody>${entries.map(blocklistRowHtml).join("") || '<tr><td colspan="5" class="nsaa-muted">No blocked buyers.</td></tr>'}</tbody>
                </table>
              </div>
            </div>
          `;

          document.getElementById("block-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            const phone = document.getElementById("block-phone").value.trim();
            const email = document.getElementById("block-email").value.trim();
            if (!phone && !email) {
              window.alert("Enter a phone number or email.");
              return;
            }
            const reason = reasonPrompt("Block this buyer");
            if (!reason) return;
            try {
              await client.mutation("buyerBlocklist:adminBlockBuyer", {
                phone: phone || undefined,
                email: email || undefined,
                reason,
              });
              await renderBlocklistTab();
            } catch (err) {
              showError(err);
            }
          });
        } catch (err) {
          root.innerHTML = "";
          showError(err);
        }
      }

      root.addEventListener("click", async (event) => {
        const button = event.target.closest(".admin-unblock");
        if (!button) return;
        const blocklistId = button.closest("[data-blocklist-id]").dataset.blocklistId;
        button.disabled = true;
        try {
          await client.mutation("buyerBlocklist:adminUnblockBuyer", { blocklistId });
          await renderBlocklistTab();
        } catch (err) {
          showError(err);
        } finally {
          button.disabled = false;
        }
      });

      // ---- Audit log ----
      async function renderAuditTab() {
        root.innerHTML = NSAA.loading("Loading audit log");
        try {
          const entries = await client.query("admin:recentAuditLog", {});
          root.innerHTML = `
            <div class="nsaa-panel">
              <h2 class="h5 mb-3">Audit log</h2>
              <div class="table-responsive">
                <table class="table align-middle mb-0">
                  <thead><tr><th>When</th><th>Admin</th><th>Action</th><th>Target</th><th>Reason</th></tr></thead>
                  <tbody>
                    ${entries
                      .map(
                        (entry) => `
                      <tr>
                        <td class="small">${NSAA.escapeHtml(NSAA.formatDate(entry.createdAt))}</td>
                        <td class="small">${NSAA.escapeHtml(entry.adminLabel)}</td>
                        <td class="small">${NSAA.escapeHtml(entry.action)}</td>
                        <td class="small nsaa-faint">${NSAA.escapeHtml(entry.targetType)}:${NSAA.escapeHtml(entry.targetId)}</td>
                        <td class="small">${NSAA.escapeHtml(entry.reason || "-")}</td>
                      </tr>
                    `,
                      )
                      .join("") || '<tr><td colspan="5" class="nsaa-muted">No admin actions logged yet.</td></tr>'}
                  </tbody>
                </table>
              </div>
            </div>
          `;
        } catch (err) {
          root.innerHTML = "";
          showError(err);
        }
      }

      // ---- Boot ----
      function renderSignInGate() {
        root.innerHTML = NSAA.emptyState(
          "Sign in required",
          "The admin console is tied to your Nsaa account.",
          `<a class="btn btn-nsaa" href="/signin?redirect_url=${encodeURIComponent(window.location.pathname)}">Sign in</a>`,
        );
      }

      async function renderNotAdminGate() {
        const who = await client.query("admin:whoAmI", {});
        root.innerHTML = NSAA.emptyState(
          "This account isn't on the admin allowlist",
          who
            ? `You're signed in as Clerk user id "${who.subject}". Ask an existing admin to add it: npx convex env set ADMIN_CLERK_USER_IDS "existing_ids,${who.subject}"`
            : "Sign in to see your account id.",
        );
      }

      async function boot() {
        if (!NSAA.isConvexConfigured()) {
          root.innerHTML = NSAA.setupNotice("Admin console");
          return;
        }

        client = new ConvexClient(NSAA.CONVEX_URL);
        const attached = await NSAA.attachConvexAuth(client);
        const clerk = await NSAA.getClerk();

        if (!clerk || !(clerk.user || clerk.isSignedIn)) {
          renderSignInGate();
          return;
        }

        if (!attached) {
          root.innerHTML = NSAA.errorState("Could not verify sign-in", "Refresh and try again.");
          return;
        }

        renderTabs();
        try {
          await client.query("ops:opsStats", {});
        } catch (err) {
          await renderNotAdminGate();
          return;
        }

        renderActiveTab();
      }

      boot();
    </script>
    <script src="js/clerk-nav.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="only light" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="module" src="js/nsaa-chrome.js"></script>
    <title>Admin ops | Nsaa Tickets</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div id="nsaa-chrome-nav"></div>

    <main class="container py-5" style="max-width: 1180px">
      <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
        <div>
          <p class="nsaa-eyebrow mb-2">Operations</p>
          <h1 class="nsaa-section-title mb-0">Admin console</h1>
        </div>
        <form id="admin-secret-form" class="d-flex gap-2 align-self-lg-end">
          <input id="admin-secret" class="form-control form-control-nsaa" type="password" placeholder="Admin secret" autocomplete="off" />
          <button class="btn btn-nsaa" type="submit">Load</button>
        </form>
      </div>
      <div id="admin-result" class="mb-3"></div>
      <div id="admin-root"></div>
    </main>

    <div id="nsaa-chrome-footer"></div>

    <script src="js/convex-config.js"></script>
    <script src="js/nsaa.js"></script>
    <script type="module">
      import { ConvexClient } from "https://esm.sh/convex/browser";

      const root = document.getElementById("admin-root");
      const resultEl = document.getElementById("admin-result");
      const secretInput = document.getElementById("admin-secret");
      const secretForm = document.getElementById("admin-secret-form");
      const STORAGE_KEY = "nsaa:adminSecret";
      let client = null;
      let adminSecret = window.localStorage.getItem(STORAGE_KEY) || "";
      secretInput.value = adminSecret;

      function statusSelect(current, kind, id) {
        return `
          <select class="form-select form-select-nsaa form-select-sm admin-status" data-kind="${NSAA.escapeAttr(kind)}" data-id="${NSAA.escapeAttr(id)}">
            ${["new", "contacted", "closed"].map((status) => `<option value="${status}" ${status === current ? "selected" : ""}>${status}</option>`).join("")}
          </select>
        `;
      }

      function render(data) {
        root.innerHTML = `
          <div class="row g-4">
            <section class="col-xl-6">
              <div class="nsaa-panel h-100">
                <h2 class="h5 mb-3">Organizer inquiries</h2>
                <div class="d-grid gap-2">
                  ${data.organizerInquiries.map((item) => `
                    <article class="nsaa-meta-item">
                      <div class="d-flex justify-content-between gap-3 mb-2">
                        <strong>${NSAA.escapeHtml(item.organizerName)}</strong>
                        ${statusSelect(item.status, "inquiry", item._id)}
                      </div>
                      <p class="nsaa-muted small mb-1">${NSAA.escapeHtml(item.contactName)} · ${NSAA.escapeHtml(item.phone)} · ${NSAA.escapeHtml(item.eventType)} in ${NSAA.escapeHtml(item.eventCity)}</p>
                      <p class="mb-0 small">${NSAA.escapeHtml(item.message)}</p>
                    </article>
                  `).join("") || '<p class="nsaa-muted mb-0">No inquiries.</p>'}
                </div>
              </div>
            </section>

            <section class="col-xl-6">
              <div class="nsaa-panel h-100">
                <h2 class="h5 mb-3">Support messages</h2>
                <div class="d-grid gap-2">
                  ${data.contactMessages.map((item) => `
                    <article class="nsaa-meta-item">
                      <div class="d-flex justify-content-between gap-3 mb-2">
                        <strong>${NSAA.escapeHtml(item.name)}</strong>
                        ${statusSelect(item.status, "contact", item._id)}
                      </div>
                      <p class="nsaa-muted small mb-1">${NSAA.escapeHtml(item.email)} · ${NSAA.escapeHtml(item.topic)}</p>
                      <p class="mb-0 small">${NSAA.escapeHtml(item.message)}</p>
                    </article>
                  `).join("") || '<p class="nsaa-muted mb-0">No messages.</p>'}
                </div>
              </div>
            </section>

            <section class="col-12">
              <div class="nsaa-panel">
                <h2 class="h5 mb-3">Event moderation and payouts</h2>
                <div class="table-responsive">
                  <table class="table align-middle mb-0">
                    <thead>
                      <tr>
                        <th>Event</th>
                        <th>Status</th>
                        <th>Organizer</th>
                        <th>Date</th>
                        <th class="text-end">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${data.events.map((event) => `
                        <tr data-event-id="${NSAA.escapeAttr(event._id)}">
                          <td>
                            <strong>${NSAA.escapeHtml(event.title)}</strong>
                            <div class="nsaa-muted small">${NSAA.escapeHtml(event.venue)}, ${NSAA.escapeHtml(event.city)}</div>
                          </td>
                          <td><span class="nsaa-chip">${NSAA.escapeHtml(event.status)}</span></td>
                          <td>${NSAA.escapeHtml(event.organizerName)}</td>
                          <td>${NSAA.escapeHtml(NSAA.formatDate(event.startsAt))}</td>
                          <td class="text-end">
                            <div class="btn-group btn-group-sm">
                              <button class="btn btn-nsaa admin-event-action" data-action="publish" type="button">Publish</button>
                              <button class="btn btn-nsaa admin-event-action" data-action="draft" type="button">Draft</button>
                              <button class="btn btn-nsaa admin-event-action" data-action="cancel" type="button">Cancel/refund</button>
                              <button class="btn btn-nsaa admin-event-action" data-action="payout" type="button">Payout</button>
                            </div>
                          </td>
                        </tr>
                      `).join("")}
                    </tbody>
                  </table>
                </div>
              </div>
            </section>
          </div>
        `;
      }

      async function loadOverview() {
        if (!NSAA.isConvexConfigured()) {
          root.innerHTML = NSAA.setupNotice("Admin ops");
          return;
        }
        if (!adminSecret) {
          root.innerHTML = NSAA.emptyState("Admin secret required", "Enter the configured ADMIN_SECRET to load operations data.");
          return;
        }
        client ||= new ConvexClient(NSAA.CONVEX_URL);
        root.innerHTML = NSAA.loading("Loading operations");
        try {
          const data = await client.query("ops:overview", { adminSecret });
          render(data);
          resultEl.innerHTML = "";
        } catch (err) {
          root.innerHTML = "";
          resultEl.innerHTML = NSAA.errorState("Could not load admin ops", err.message || "Check the secret and try again.");
        }
      }

      secretForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        adminSecret = secretInput.value.trim();
        window.localStorage.setItem(STORAGE_KEY, adminSecret);
        await loadOverview();
      });

      root.addEventListener("change", async (event) => {
        const select = event.target.closest(".admin-status");
        if (!select) return;
        try {
          if (select.dataset.kind === "inquiry") {
            await client.mutation("ops:setOrganizerInquiryStatus", {
              adminSecret,
              inquiryId: select.dataset.id,
              status: select.value,
            });
          } else {
            await client.mutation("ops:setContactMessageStatus", {
              adminSecret,
              messageId: select.dataset.id,
              status: select.value,
            });
          }
          await loadOverview();
        } catch (err) {
          resultEl.innerHTML = NSAA.errorState("Could not update status", err.message || "Please try again.");
        }
      });

      root.addEventListener("click", async (event) => {
        const button = event.target.closest(".admin-event-action");
        if (!button) return;
        const row = button.closest("[data-event-id]");
        const eventId = row.dataset.eventId;
        button.disabled = true;
        try {
          if (button.dataset.action === "publish" || button.dataset.action === "draft") {
            await client.mutation("ops:setEventStatusAdmin", {
              adminSecret,
              eventId,
              status: button.dataset.action === "publish" ? "published" : "draft",
            });
          }
          if (button.dataset.action === "cancel") {
            if (!window.confirm("Cancel this event and mark paid orders as refunded/void tickets?")) return;
            await client.mutation("ops:cancelEventAndMarkRefunded", { adminSecret, eventId });
          }
          if (button.dataset.action === "payout") {
            const result = await client.action("payouts:initiateOrganizerPayout", { adminSecret, eventId });
            resultEl.innerHTML = `<div class="nsaa-status-box success"><p class="fw-semibold mb-1">Payout ${NSAA.escapeHtml(result.status)}</p><p class="mb-0">${NSAA.money(result.amountGHS || 0)}</p></div>`;
          }
          await loadOverview();
        } catch (err) {
          resultEl.innerHTML = NSAA.errorState("Admin action failed", err.message || "Please try again.");
        } finally {
          button.disabled = false;
        }
      });

      loadOverview();
    </script>
    <script src="js/clerk-nav.js"></script>
  </body>
</html>

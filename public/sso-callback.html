<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signing you in... | Nsaa Tickets</title>
    <meta name="robots" content="noindex" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
  </head>
  <body class="checkout-body">
    <script src="js/clerk-config.js"></script>
    <script src="js/clerk-loader.js"></script>
    <script src="js/convex-config.js"></script>

    <main class="container py-5 text-center" style="max-width: 420px">
      <p class="nsaa-muted small mb-2">Finishing sign-in...</p>
      <div id="callback-status"></div>
    </main>

    <script src="js/nsaa.js"></script>
    <script type="module">
      const params = new URLSearchParams(window.location.search);
      const redirectUrl = params.get("redirect_url") || "/";
      const statusEl = document.getElementById("callback-status");

      async function boot() {
        const clerk = await NSAA.getClerk();

        if (!clerk) {
          statusEl.innerHTML = NSAA.errorState(
            "Sign-in setup needed",
            "Add your Clerk publishable key and Frontend API URL to finish this.",
          );
          return;
        }

        try {
          await clerk.handleRedirectCallback({ redirectUrl });
          window.location.href = redirectUrl;
        } catch (err) {
          statusEl.innerHTML = NSAA.errorState(
            "Could not finish sign-in",
            err?.errors?.[0]?.message || err.message || "Please try signing in again.",
          );
        }
      }

      boot();
    </script>
  </body>
</html>

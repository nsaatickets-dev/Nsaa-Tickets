<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nsaa Tickets embed</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
      body {
        background: transparent;
        background-image: none;
        margin: 0;
      }
      body::after {
        display: none;
      }
      .nsaa-embed {
        max-width: 420px;
      }
    </style>
  </head>
  <body>
    <main class="nsaa-embed p-3">
      <div id="embed-root"></div>
    </main>

    <script src="js/convex-config.js"></script>
    <script src="js/nsaa.js"></script>
    <script type="module">
      import { ConvexClient } from "https://esm.sh/convex/browser";

      const params = new URLSearchParams(window.location.search);
      const eventId = params.get("eventId");
      const slug = params.get("slug");
      const ref = params.get("ref") || "";
      const root = document.getElementById("embed-root");

      function render(event) {
        if (!event) {
          root.innerHTML = NSAA.emptyState("Event unavailable", "This Nsaa event could not be loaded.");
          return;
        }
        const href = `${window.location.origin}${NSAA.eventHref(event, ref ? { ref } : {})}`;
        root.innerHTML = `
          <article class="nsaa-panel">
            <div class="nsaa-event-media mb-3" style="background-image: linear-gradient(180deg, rgba(15,14,17,0.02), rgba(15,14,17,0.42)), url('${NSAA.escapeAttr(NSAA.eventImage(event))}');"></div>
            <span class="nsaa-chip mb-3" data-tone="${NSAA.escapeAttr(NSAA.categoryMeta(event.category).tone)}">${NSAA.escapeHtml(NSAA.categoryMeta(event.category).shortLabel)}</span>
            <h1 class="h4 mb-2">${NSAA.escapeHtml(event.title)}</h1>
            <p class="nsaa-muted small mb-3">${NSAA.escapeHtml(event.venue)}, ${NSAA.escapeHtml(event.city)} · ${NSAA.escapeHtml(NSAA.formatDate(event.startsAt))}</p>
            <a class="btn btn-nsaa w-100" href="${NSAA.escapeAttr(href)}" target="_blank" rel="noreferrer">Buy tickets</a>
          </article>
        `;
      }

      if (!NSAA.isConvexConfigured()) {
        root.innerHTML = NSAA.setupNotice("Embed");
      } else if (!eventId && !slug) {
        root.innerHTML = NSAA.emptyState("No event selected", "Add eventId or slug to this embed URL.");
      } else {
        const client = new ConvexClient(NSAA.CONVEX_URL);
        const eventArgs = {};
        if (eventId) eventArgs.eventId = eventId;
        if (slug) eventArgs.slug = slug;
        client.onUpdate("events:getPublicEvent", eventArgs, render);
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="only light" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="module" src="js/nsaa-chrome.js"></script>
    <title>Contact | Nsaa Tickets</title>
    <meta
      name="description"
      content="Get in touch with the Nsaa Tickets team for support, payments questions, press, or partnerships."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div id="nsaa-chrome-nav"></div>

    <script src="js/clerk-config.js"></script>
    <script src="js/clerk-loader.js"></script>

<main class="container py-5">
      <div class="row g-5 align-items-start">
        <section class="col-lg-5">
          <p class="nsaa-eyebrow mb-3">Contact</p>
          <h1 class="nsaa-page-title mb-4">Talk to Nsaa.</h1>
          <p class="lead nsaa-muted mb-4">
            Support, payments questions, press, or partnerships - reach the
            team directly, or use the form and we'll follow up.
          </p>
          <div class="d-grid gap-3">
            <div class="nsaa-panel d-flex align-items-center gap-3">
              <span class="nsaa-icon-badge flex-shrink-0"><i class="ph ph-envelope-simple nsaa-trust-icon"></i></span>
              <div>
                <p class="nsaa-faint small mb-1">Email</p>
                <p class="mb-0 fw-semibold">support@nsaatickets.com</p>
              </div>
            </div>
            <div class="nsaa-panel d-flex align-items-center gap-3">
              <span class="nsaa-icon-badge flex-shrink-0"><i class="ph ph-phone nsaa-trust-icon"></i></span>
              <div>
                <p class="nsaa-faint small mb-1">Phone</p>
                <p class="mb-0 fw-semibold">+233 24 000 0000</p>
              </div>
            </div>
            <div class="nsaa-panel d-flex align-items-center gap-3">
              <span class="nsaa-icon-badge flex-shrink-0"><i class="ph ph-map-pin nsaa-trust-icon"></i></span>
              <div>
                <p class="nsaa-faint small mb-1">Office</p>
                <p class="mb-0 fw-semibold">Accra, Ghana</p>
              </div>
            </div>
          </div>
        </section>

        <section class="col-lg-7">
          <div class="nsaa-panel">
            <h2 class="h3 mb-2">Send a message</h2>
            <p class="nsaa-muted mb-4">
              We typically respond within one business day.
            </p>
            <form id="contact-form" novalidate>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label nsaa-muted small" for="name"
                    >Your name</label
                  >
                  <input
                    id="name"
                    class="form-control form-control-nsaa"
                    type="text"
                    placeholder="Ama Mensah"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label nsaa-muted small" for="email"
                    >Email</label
                  >
                  <input
                    id="email"
                    class="form-control form-control-nsaa"
                    type="email"
                    placeholder="you@example.com"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label nsaa-muted small" for="topic"
                    >Topic</label
                  >
                  <select
                    id="topic"
                    class="form-select form-select-nsaa"
                    required
                  >
                    <option value="">Select a topic</option>
                    <option value="support">General support</option>
                    <option value="payments">Payments &amp; refunds</option>
                    <option value="press">Press</option>
                    <option value="partnerships">Partnerships</option>
                    <option value="other">Something else</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label nsaa-muted small" for="message"
                    >Message</label
                  >
                  <textarea
                    id="message"
                    class="form-control form-control-nsaa"
                    rows="5"
                    placeholder="How can we help?"
                    required
                  ></textarea>
                </div>
              </div>
              <div id="form-result" class="mt-3"></div>
              <button
                id="submit-btn"
                class="btn btn-nsaa w-100 mt-4"
                type="submit"
              >
                Send message
              </button>
            </form>
          </div>
        </section>
      </div>
    </main>

    <div id="nsaa-chrome-footer"></div>

    <script src="js/convex-config.js"></script>
    <script src="js/nsaa.js"></script>
    <script type="module">
      import { ConvexClient } from "https://esm.sh/convex/browser";

      const form = document.getElementById("contact-form");
      const resultEl = document.getElementById("form-result");
      const submitBtn = document.getElementById("submit-btn");
      const fields = ["name", "email", "topic", "message"];

      if (!NSAA.isConvexConfigured()) {
        resultEl.innerHTML = NSAA.errorState(
          "Setup needed",
          "Replace CONVEX_URL before messages can be sent.",
        );
        submitBtn.disabled = true;
      } else {
        const client = new ConvexClient(NSAA.CONVEX_URL);

        fields.forEach((id) => {
          const el = document.getElementById(id);
          el.addEventListener(el.tagName === "SELECT" ? "change" : "input", () => {
            el.classList.remove("is-invalid");
          });
        });

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          resultEl.innerHTML = "";

          const payload = {
            name: document.getElementById("name").value.trim(),
            email: document.getElementById("email").value.trim(),
            topic: document.getElementById("topic").value,
            message: document.getElementById("message").value.trim(),
          };

          fields.forEach((id) => {
            document.getElementById(id).classList.remove("is-invalid", "is-valid");
          });

          let hasError = false;

          if (!payload.name) {
            document.getElementById("name").classList.add("is-invalid");
            hasError = true;
          } else {
            document.getElementById("name").classList.add("is-valid");
          }

          if (!payload.email || !NSAA.isValidEmail(payload.email)) {
            document.getElementById("email").classList.add("is-invalid");
            hasError = true;
          } else {
            document.getElementById("email").classList.add("is-valid");
          }

          if (!payload.topic) {
            document.getElementById("topic").classList.add("is-invalid");
            hasError = true;
          } else {
            document.getElementById("topic").classList.add("is-valid");
          }

          if (!payload.message) {
            document.getElementById("message").classList.add("is-invalid");
            hasError = true;
          } else {
            document.getElementById("message").classList.add("is-valid");
          }

          if (hasError) {
            resultEl.innerHTML = NSAA.errorState(
              "Check message details",
              "Please check the fields in red.",
            );
            return;
          }

          submitBtn.disabled = true;
          submitBtn.textContent = "Sending...";

          try {
            await client.mutation("contactMessages:create", payload);
            form.reset();
            resultEl.innerHTML = `
              <div class="nsaa-status-box success">
                <p class="fw-semibold mb-1">Message sent</p>
                <p class="mb-0">The Nsaa team will get back to you soon.</p>
              </div>
            `;
          } catch (err) {
            resultEl.innerHTML = NSAA.errorState(
              "Could not send message",
              err.message || "Please try again.",
            );
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Send message";
          }
        });
      }
    </script>
    <script src="js/clerk-nav.js"></script>
  </body>
</html>

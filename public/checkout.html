<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="only light" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout | Nsaa Tickets</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body class="checkout-body">
    <nav class="navbar nsaa-navbar">
      <div class="container">
        <a
          class="nsaa-brand-lockup"
          href="/"
          aria-label="Nsaa Tickets home"
        >
          <span class="nsaa-wordmark">Nsaa</span>
          <span class="nsaa-brand-tickets" aria-label="Tickets"
            >T I C K E T S</span
          >
        </a>
        <span class="ms-auto nsaa-muted small">Secure checkout</span>
      </div>
    </nav>

    <script src="js/clerk-config.js"></script>
    <script src="js/clerk-loader.js"></script>

<main class="container py-5" style="max-width: 1120px">
      <div id="checkout-root">
        <div id="checkout-loading"></div>
      </div>
    </main>

    <script src="js/convex-config.js"></script>
    <script src="js/nsaa.js"></script>
    <script type="module">
      import { ConvexClient } from "https://esm.sh/convex/browser";

      const params = new URLSearchParams(window.location.search);
      const eventId = params.get("eventId");
      const ticketTypeId = params.get("ticketTypeId");
      const referralCode = params.get("ref") || "";
      const root = document.getElementById("checkout-root");

      let client = null;
      let eventRecord = null;
      let ticketType = null;
      let quantity = 1;
      let currentOrderId = null;
      let checkoutRendered = false;
      let reservedUntil = null;
      let reservationTimer = null;
      let selectedPaymentMethod = "momo";

      function serviceFee(subtotal) {
        return Math.round(subtotal * 0.035 * 100) / 100;
      }

      function totalsFor(qty) {
        const subtotal = (ticketType?.priceGHS ?? 0) * qty;
        const fee = serviceFee(subtotal);
        return {
          subtotal,
          fee,
          total: Math.round((subtotal + fee) * 100) / 100,
        };
      }

      function renderShell() {
        if (!eventRecord || !ticketType) return;
        if (checkoutRendered) {
          updateSummary();
          return;
        }
        checkoutRendered = true;
        const available = ticketType.quantityAvailable ?? 0;
        quantity = Math.min(Math.max(quantity, 1), Math.max(available, 1));
        const eventImage = NSAA.eventImage(eventRecord);
        const eventDate = eventRecord.startsAt ? NSAA.formatDate(eventRecord.startsAt) : "Date TBA";
        const placeLine = [eventRecord.venue, eventRecord.city].filter(Boolean).join(", ");

        root.innerHTML = `
        <div class="nsaa-checkout-shell">
          <header class="nsaa-checkout-hero">
            <div class="nsaa-checkout-hero-media" style="background-image: linear-gradient(180deg, rgba(34,29,24,0.04), rgba(34,29,24,0.3)), url('${NSAA.escapeAttr(eventImage)}');"></div>
            <div class="nsaa-checkout-hero-copy">
              <p class="nsaa-eyebrow mb-2">Secure checkout</p>
              <h1 class="h3 mb-2">Complete your ticket order</h1>
              <p class="nsaa-muted mb-3">Reserve your ticket first, then approve Mobile Money or card payment. No account required.</p>
              <div class="nsaa-checkout-progress" aria-label="Checkout progress">
                <div id="checkout-progress-details" class="nsaa-checkout-progress-item active">
                  <span>1</span>
                  <div>
                    <p class="mb-0 fw-semibold">Details</p>
                    <small>Contact and quantity</small>
                  </div>
                </div>
                <div id="checkout-progress-payment" class="nsaa-checkout-progress-item">
                  <span>2</span>
                  <div>
                    <p class="mb-0 fw-semibold">Payment</p>
                    <small>Approve prompt</small>
                  </div>
                </div>
              </div>
            </div>
          </header>

          <div class="nsaa-checkout-grid">
            <section class="nsaa-checkout-main">
              <div id="details-step" class="nsaa-panel nsaa-checkout-card">
                <div class="d-flex align-items-start justify-content-between gap-3 mb-3">
                  <div>
                    <p class="nsaa-eyebrow mb-2">Guest details</p>
                    <h2 class="h4 mb-1">Who should receive the tickets?</h2>
                  </div>
                  <span class="nsaa-chip">Step 1 of 2</span>
                </div>
                <p class="nsaa-muted mb-4">Your phone number receives the Mobile Money prompt. Your receipt and scannable QR ticket are emailed to you.</p>

                <form id="details-form" novalidate>
                  <div class="row g-3">
                    <div class="col-12">
                      <label class="form-label nsaa-muted small" for="buyer-name">Full name</label>
                      <input id="buyer-name" class="form-control form-control-nsaa" type="text" autocomplete="name" placeholder="Ama Mensah" required />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label nsaa-muted small" for="buyer-phone">Mobile Money number</label>
                      <input id="buyer-phone" class="form-control form-control-nsaa" type="tel" autocomplete="tel" placeholder="024 000 0000" required />
                      <p class="nsaa-faint small mt-2 mb-0">MTN, Telecel, and AirtelTigo numbers are supported.</p>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label nsaa-muted small" for="buyer-email">Email</label>
                      <input id="buyer-email" class="form-control form-control-nsaa" type="email" autocomplete="email" placeholder="name@email.com" required />
                      <p class="nsaa-faint small mt-2 mb-0">Your QR ticket is sent here after payment.</p>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label nsaa-muted small" for="buyer-quantity">Quantity</label>
                      <input id="buyer-quantity" class="form-control form-control-nsaa" type="number" min="1" max="${NSAA.escapeAttr(available)}" value="${NSAA.escapeAttr(quantity)}" required />
                    </div>
                  </div>

                  <div id="details-error" class="mt-3"></div>
                  <button id="reserve-btn" class="btn btn-nsaa w-100 mt-4" type="submit" ${available <= 0 ? "disabled" : ""}>Reserve tickets</button>
                </form>
              </div>

              <div id="payment-step" class="nsaa-panel nsaa-checkout-card d-none">
                <div class="d-flex align-items-start justify-content-between gap-3 mb-3">
                  <div>
                    <p class="nsaa-eyebrow mb-2">Payment</p>
                    <h2 class="h4 mb-1">Approve payment on your phone</h2>
                  </div>
                  <span class="nsaa-chip">Step 2 of 2</span>
                </div>
                <p class="nsaa-muted mb-4">Your tickets are held while you approve payment. Keep this page open until Nsaa confirms your order.</p>

                <div class="nsaa-checkout-payment-grid mb-3">
                  <div class="nsaa-hold-countdown">
                    <span class="nsaa-faint small d-block">Reservation hold</span>
                    <strong id="reservation-countdown">10:00</strong>
                    <span class="nsaa-muted small">Inventory is locked for your order.</span>
                  </div>
                  <div id="payment-status" class="nsaa-status-box waiting">
                    <p class="fw-semibold mb-1">Waiting to send request</p>
                    <p class="mb-0">Your ticket reservation is held while you start payment.</p>
                  </div>
                </div>

                <div class="nsaa-payment-methods mb-3" role="radiogroup" aria-label="Payment method">
                  <button class="nsaa-payment-method active" type="button" data-payment-method="momo" role="radio" aria-checked="true">
                    <span class="nsaa-payment-method-icon"><i class="ph ph-device-mobile" aria-hidden="true"></i></span>
                    <span class="nsaa-payment-method-copy">
                      <strong>Mobile Money</strong>
                      <small>MTN, Telecel, and AirtelTigo approval prompt</small>
                    </span>
                    <span class="nsaa-payment-method-check"><i class="ph ph-check" aria-hidden="true"></i></span>
                  </button>
                  <button class="nsaa-payment-method" type="button" data-payment-method="card" role="radio" aria-checked="false">
                    <span class="nsaa-payment-method-icon"><i class="ph ph-credit-card" aria-hidden="true"></i></span>
                    <span class="nsaa-payment-method-copy">
                      <strong>Card checkout</strong>
                      <small>Secure hosted Moolre card page</small>
                    </span>
                    <span class="nsaa-payment-method-check"><i class="ph ph-check" aria-hidden="true"></i></span>
                  </button>
                </div>

                <div class="nsaa-payment-actions">
                  <button id="pay-btn" class="btn btn-nsaa" type="button">
                    <i class="ph ph-device-mobile" aria-hidden="true"></i>
                    Send Mobile Money prompt
                  </button>
                  <button id="pay-card-btn" class="btn btn-nsaa d-none" type="button">
                    <i class="ph ph-credit-card" aria-hidden="true"></i>
                    Continue to card checkout
                  </button>
                  <a id="status-link" class="btn btn-outline-nsaa" href="/order-status">
                    <i class="ph ph-receipt" aria-hidden="true"></i>
                    Open order status
                  </a>
                </div>

                <div id="otp-step" class="d-none mt-3">
                  <label class="form-label nsaa-muted small" for="otp-code">Verification code</label>
                  <div class="d-flex gap-2">
                    <input id="otp-code" class="form-control form-control-nsaa" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="123456" />
                    <button id="otp-submit-btn" class="btn btn-nsaa" type="button">Verify</button>
                  </div>
                  <p class="nsaa-faint small mt-2 mb-0">Moolre sent a verification code to your phone via SMS. Enter it above to continue.</p>
                </div>
              </div>

              <div class="nsaa-checkout-assurance">
                <div>
                  <i class="ph ph-lock-key" aria-hidden="true"></i>
                  <span>Secure payment</span>
                </div>
                <div>
                  <i class="ph ph-qr-code" aria-hidden="true"></i>
                  <span>One-time QR</span>
                </div>
                <div>
                  <i class="ph ph-envelope-simple" aria-hidden="true"></i>
                  <span>Email receipt</span>
                </div>
              </div>
            </section>

            <aside class="nsaa-checkout-aside">
              <div class="nsaa-panel nsaa-checkout-summary">
                <p class="nsaa-eyebrow mb-2">Order summary</p>
                <div class="nsaa-summary-event">
                  <div class="nsaa-summary-event-media" style="background-image: url('${NSAA.escapeAttr(eventImage)}');"></div>
                  <div>
                    <h2 class="h5 mb-1">${NSAA.escapeHtml(eventRecord.title)}</h2>
                    <p class="nsaa-muted small mb-1">${NSAA.escapeHtml(ticketType.name)}</p>
                    <p class="nsaa-faint small mb-0">${NSAA.escapeHtml(eventDate)} &middot; ${NSAA.escapeHtml(placeLine || eventRecord.venue)}</p>
                  </div>
                </div>
                <div class="nsaa-summary-lines mt-3">
                  <div class="d-flex justify-content-between py-2">
                    <span class="nsaa-muted">Ticket price</span>
                    <span id="summary-ticket-price">${NSAA.money(ticketType.priceGHS)}</span>
                  </div>
                  <div class="d-flex justify-content-between py-2">
                    <span class="nsaa-muted">Quantity</span>
                    <span id="summary-quantity">${quantity}</span>
                  </div>
                  <div class="d-flex justify-content-between py-2 nsaa-divider-dashed">
                    <span class="nsaa-muted">Ticket subtotal</span>
                    <span id="summary-subtotal"></span>
                  </div>
                  <div class="d-flex justify-content-between py-2">
                    <span class="nsaa-muted">Service fee</span>
                    <span id="summary-fee"></span>
                  </div>
                  <div class="d-flex justify-content-between py-3 fs-5 fw-semibold nsaa-divider-dashed">
                    <span>Total due</span>
                    <span id="summary-total" style="color: var(--nsaa-gold);"></span>
                  </div>
                </div>
                <p class="nsaa-faint small mb-0">${available <= 0 ? "This ticket type is sold out." : `${available} currently available. Availability updates live.`}</p>
                <div class="nsaa-soft-panel p-3 mt-3">
                  <p class="fw-semibold mb-1"><i class="ph ph-shield-check me-1"></i>Duplicate QR protection</p>
                  <p class="nsaa-muted small mb-0">Each paid ticket receives a signed one-time QR code. A screenshot can still only scan once at the door.</p>
                </div>
              </div>
            </aside>
          </div>
        </div>
      `;

        bindCheckout();
        updateSummary();
      }

      function updateSummary() {
        const qtyInput = document.getElementById("buyer-quantity");
        if (qtyInput) {
          quantity = Math.max(1, Number(qtyInput.value || 1));
        }
        const totals = totalsFor(quantity);
        document.getElementById("summary-quantity").textContent = quantity;
        document.getElementById("summary-subtotal").textContent = NSAA.money(
          totals.subtotal,
        );
        document.getElementById("summary-fee").textContent = NSAA.money(
          totals.fee,
        );
        document.getElementById("summary-total").textContent = NSAA.money(
          totals.total,
        );
      }

      function startReservationCountdown(until) {
        reservedUntil = until;
        if (reservationTimer) window.clearInterval(reservationTimer);
        const target = document.getElementById("reservation-countdown");
        if (!target || !reservedUntil) return;

        const tick = () => {
          const remaining = Math.max(0, reservedUntil - Date.now());
          const minutes = Math.floor(remaining / 60000);
          const seconds = Math.floor((remaining % 60000) / 1000);
          target.textContent = `${minutes}:${String(seconds).padStart(2, "0")}`;
          if (remaining <= 0) {
            window.clearInterval(reservationTimer);
            setPaymentState(
              "failed",
              "Reservation expired",
              "The hold window ended. Start checkout again to reserve fresh inventory.",
            );
          }
        };
        tick();
        reservationTimer = window.setInterval(tick, 1000);
      }

      function setSelectedPaymentMethod(method) {
        selectedPaymentMethod = method === "card" ? "card" : "momo";
        document.querySelectorAll("[data-payment-method]").forEach((button) => {
          const isActive = button.getAttribute("data-payment-method") === selectedPaymentMethod;
          button.classList.toggle("active", isActive);
          button.setAttribute("aria-checked", isActive ? "true" : "false");
        });

        const payBtn = document.getElementById("pay-btn");
        const cardBtn = document.getElementById("pay-card-btn");
        const otpStep = document.getElementById("otp-step");
        if (payBtn) payBtn.classList.toggle("d-none", selectedPaymentMethod !== "momo");
        if (cardBtn) cardBtn.classList.toggle("d-none", selectedPaymentMethod !== "card");
        if (otpStep && selectedPaymentMethod === "card") {
          otpStep.classList.add("d-none");
        }

        setPaymentState(
          "waiting",
          selectedPaymentMethod === "card" ? "Card checkout selected" : "Mobile Money selected",
          selectedPaymentMethod === "card"
            ? "Continue to Moolre's secure hosted card page. Your reservation stays held while you complete payment."
            : "Send a payment prompt to the Mobile Money number you entered.",
        );
      }

      function bindCheckout() {
        document
          .getElementById("buyer-quantity")
          .addEventListener("input", updateSummary);
        document
          .getElementById("details-form")
          .addEventListener("submit", reserveOrder);

        const fields = ["buyer-name", "buyer-phone", "buyer-email", "buyer-quantity"];
        fields.forEach(id => {
          const el = document.getElementById(id);
          if (el) {
            el.addEventListener("input", () => {
              el.classList.remove("is-invalid");
            });
          }
        });

        document.querySelectorAll("[data-payment-method]").forEach((button) => {
          button.addEventListener("click", () => {
            setSelectedPaymentMethod(button.getAttribute("data-payment-method"));
          });
        });
      }

      async function reserveOrder(event) {
        event.preventDefault();
        const errorEl = document.getElementById("details-error");
        const reserveBtn = document.getElementById("reserve-btn");
        errorEl.innerHTML = "";

        const buyerName = document.getElementById("buyer-name").value.trim();
        const buyerPhone = document.getElementById("buyer-phone").value.trim();
        const buyerEmail = document.getElementById("buyer-email").value.trim();
        const requestedQuantity = Number(
          document.getElementById("buyer-quantity").value || 1,
        );

        let hasError = false;
        
        // Reset states
        const fields = ["buyer-name", "buyer-phone", "buyer-email", "buyer-quantity"];
        fields.forEach(id => {
          const el = document.getElementById(id);
          if (el) el.classList.remove("is-invalid", "is-valid");
        });

        if (!buyerName) {
          document.getElementById("buyer-name").classList.add("is-invalid");
          hasError = true;
        } else {
          document.getElementById("buyer-name").classList.add("is-valid");
        }

        if (!buyerPhone || !NSAA.isValidGhanaPhone(buyerPhone)) {
          document.getElementById("buyer-phone").classList.add("is-invalid");
          hasError = true;
        } else {
          document.getElementById("buyer-phone").classList.add("is-valid");
        }

        if (!buyerEmail || !NSAA.isValidEmail(buyerEmail)) {
          document.getElementById("buyer-email").classList.add("is-invalid");
          hasError = true;
        } else {
          document.getElementById("buyer-email").classList.add("is-valid");
        }

        const maxAvailable = ticketType?.quantityAvailable ?? 1;
        if (requestedQuantity < 1 || requestedQuantity > maxAvailable) {
          document.getElementById("buyer-quantity").classList.add("is-invalid");
          hasError = true;
        } else {
          document.getElementById("buyer-quantity").classList.add("is-valid");
        }

        if (hasError) {
          errorEl.innerHTML = NSAA.errorState(
            "Check details",
            "Please check the highlighted fields. Provide a valid name, active Ghanaian MoMo number, and quantity."
          );
          return;
        }

        reserveBtn.disabled = true;
        reserveBtn.textContent = "Reserving tickets...";

        try {
          const result = await client.mutation("orders:createReservation", {
            eventId,
            ticketTypeId,
            quantity: requestedQuantity,
            buyerName,
            buyerPhone,
            buyerEmail,
            referralCode: referralCode || undefined,
          });

          currentOrderId = result.orderId;
          reservedUntil = result.reservedUntil;
          window.localStorage.setItem("nsaa:lastOrderId", currentOrderId);
          showPaymentStep();
        } catch (err) {
          errorEl.innerHTML = NSAA.errorState(
            "Could not reserve tickets",
            err.message || "Please try again.",
          );
          reserveBtn.disabled = false;
          reserveBtn.textContent = "Reserve tickets";
        }
      }

      function showPaymentStep() {
        document.getElementById("details-step").classList.add("d-none");
        document.getElementById("payment-step").classList.remove("d-none");
        document.getElementById("checkout-progress-details")?.classList.remove("active");
        document.getElementById("checkout-progress-details")?.classList.add("complete");
        document.getElementById("checkout-progress-payment")?.classList.add("active");
        startReservationCountdown(reservedUntil);
        document.getElementById("status-link").href =
          `/order-status?orderId=${encodeURIComponent(currentOrderId)}`;
        setSelectedPaymentMethod(selectedPaymentMethod);

        client.onUpdate(
          "orders:getOrderSummary",
          { orderId: currentOrderId },
          (summary) => {
            if (!summary) return;
            const order = summary.order;
            document.getElementById("summary-subtotal").textContent =
              NSAA.money(order.ticketSubtotalGHS);
            document.getElementById("summary-fee").textContent = NSAA.money(
              order.serviceFeeGHS,
            );
            document.getElementById("summary-total").textContent = NSAA.money(
              order.totalGHS,
            );

            if (order.status === "paid") {
              window.location.href = `/wallet?orderId=${encodeURIComponent(order._id)}`;
            }
            if (order.status === "expired") {
              setPaymentState(
                "failed",
                "Reservation expired",
                "The hold window ended before payment was confirmed. Start again to reserve fresh inventory.",
              );
              document.getElementById("pay-btn").disabled = true;
            }
            if (order.status === "failed") {
              setPaymentState(
                "failed",
                "Payment did not start",
                order.moolreFailureReason
                  ? `${order.moolreFailureReason} No charge was made and no ticket was issued.`
                  : "No charge was made and no ticket was issued. Start a fresh checkout from the event page or contact support if this keeps happening.",
              );
              document.getElementById("pay-btn").disabled = true;
              document.getElementById("pay-card-btn").disabled = true;
            }
          },
        );
      }

      function setPaymentState(kind, title, body) {
        const box = document.getElementById("payment-status");
        box.className = `nsaa-status-box ${kind} mb-3`;
        box.innerHTML = `
        <p class="fw-semibold mb-1">${NSAA.escapeHtml(title)} ${kind === "waiting" ? '<span class="nsaa-progress-dots" aria-hidden="true"><span></span><span></span><span></span></span>' : ""}</p>
        <p class="mb-0">${NSAA.escapeHtml(body)}</p>
      `;
      }

      async function submitMoolrePayment(otpcode) {
        const payBtn = document.getElementById("pay-btn");
        const otpStep = document.getElementById("otp-step");
        const otpSubmitBtn = document.getElementById("otp-submit-btn");
        const activeBtn = otpcode ? otpSubmitBtn : payBtn;
        activeBtn.disabled = true;

        setPaymentState(
          "waiting",
          otpcode ? "Verifying code" : "Sending payment prompt",
          otpcode
            ? "Confirming your verification code with Moolre."
            : "Keep this page open. Your phone may ask you to approve the Mobile Money payment.",
        );

        try {
          const result = await client.action("orders:initiateMoolrePayment", {
            orderId: currentOrderId,
            ...(otpcode ? { otpcode } : {}),
          });

          if (result.status === "otp_required" || result.status === "otp_invalid") {
            otpStep.classList.remove("d-none");
            payBtn.disabled = true;
            otpSubmitBtn.disabled = false;
            setPaymentState(
              "waiting",
              result.status === "otp_invalid" ? "Incorrect code" : "Enter verification code",
              "Moolre sent a code to your phone via SMS. Enter it above to continue.",
            );
            return;
          }

          otpStep.classList.add("d-none");
          setPaymentState(
            "waiting",
            "Waiting for confirmation",
            "Approve the prompt on your phone. Nsaa will move you to your tickets as soon as payment is confirmed.",
          );
          payBtn.innerHTML = `<i class="ph ph-check" aria-hidden="true"></i> Payment request sent`;
        } catch (err) {
          setPaymentState(
            "failed",
            "Could not start payment",
            err.message || "Please try again.",
          );
          payBtn.disabled = false;
          otpSubmitBtn.disabled = false;
        }
      }

      document.addEventListener("click", async (event) => {
        const target = event.target instanceof Element ? event.target : null;
        if (target?.closest("#pay-btn")) {
          await submitMoolrePayment();
        }
        if (target?.closest("#otp-submit-btn")) {
          const code = document.getElementById("otp-code").value.trim();
          if (!code) return;
          await submitMoolrePayment(code);
        }
        const cardButton = target?.closest("#pay-card-btn");
        if (cardButton) {
          const cardBtn = cardButton;
          cardBtn.disabled = true;
          cardBtn.innerHTML = `<i class="ph ph-spinner-gap" aria-hidden="true"></i> Redirecting to card checkout...`;
          setPaymentState(
            "waiting",
            "Opening card checkout",
            "You'll be redirected to a secure Moolre checkout page to enter your card details.",
          );
          try {
            const result = await client.action("orders:initiateCardPayment", {
              orderId: currentOrderId,
            });
            window.location.href = result.authorizationUrl;
          } catch (err) {
            setPaymentState(
              "failed",
              "Could not start card payment",
              err.message || "Please try again.",
            );
            cardBtn.disabled = false;
            cardBtn.innerHTML = `<i class="ph ph-credit-card" aria-hidden="true"></i> Continue to card checkout`;
          }
        }
      });

      if (!eventId || !ticketTypeId) {
        root.innerHTML = NSAA.emptyState(
          "Checkout link incomplete",
          "Choose a ticket from an event page to begin checkout.",
          '<a class="btn btn-nsaa" href="/">Browse events</a>',
        );
      } else if (!NSAA.isConvexConfigured()) {
        root.innerHTML = NSAA.setupNotice("Checkout");
      } else {
        client = new ConvexClient(NSAA.CONVEX_URL);
        NSAA.attachConvexAuth(client, { wait: false });
        document.getElementById("checkout-loading").innerHTML =
          NSAA.loading("Preparing checkout");

        client.onUpdate("events:getById", { eventId }, (event) => {
          eventRecord = event;
          renderShell();
        });

        client.onUpdate(
          "events:ticketTypesForEvent",
          { eventId },
          (ticketTypes) => {
            ticketType = (ticketTypes || []).find(
              (item) => item._id === ticketTypeId,
            );
            if (ticketTypes && !ticketType) {
              root.innerHTML = NSAA.emptyState(
                "Ticket type not found",
                "This ticket may no longer be available for the selected event.",
                '<a class="btn btn-nsaa" href="/">Browse events</a>',
              );
              return;
            }
            renderShell();
          },
        );
      }
    </script>
  </body>
</html>

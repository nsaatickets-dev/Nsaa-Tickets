<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create account | Nsaa Tickets</title>
    <meta name="robots" content="noindex" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/nsaa.css" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body class="checkout-body">
    <nav class="navbar nsaa-navbar">
      <div class="container">
        <a
          class="nsaa-brand-lockup"
          href="index.html"
          aria-label="Nsaa Tickets home"
        >
          <span class="nsaa-wordmark">Nsaa</span>
          <span class="nsaa-brand-tickets" aria-label="Tickets"
            >T I C K E T S</span
          >
        </a>
        <span class="ms-auto nsaa-muted small">Create account</span>
      </div>
    </nav>

    <script src="js/clerk-config.js"></script>
    <script src="js/clerk-loader.js"></script>

    <main class="container py-5" style="max-width: 440px">
      <div class="text-center mb-4">
        <p class="nsaa-eyebrow mb-2">New here</p>
        <h1 class="h3 mb-2">Create your Nsaa account</h1>
        <p class="nsaa-muted small mb-0">
          Optional - you can always buy tickets as a guest with just your
          name and phone number. An account just keeps every ticket you
          buy in one place.
        </p>
      </div>
      <div class="nsaa-panel">
        <div id="clerk-mount"></div>
        <div id="clerk-fallback" class="d-none">
          <div id="clerk-fallback-body"></div>
        </div>
      </div>
    </main>

    <script src="js/nsaa.js"></script>
    <script type="module">
      const params = new URLSearchParams(window.location.search);
      const redirectUrl = params.get("redirect_url") || "index.html";
      const mountEl = document.getElementById("clerk-mount");
      const fallbackEl = document.getElementById("clerk-fallback");
      const fallbackBodyEl = document.getElementById("clerk-fallback-body");

      const CLERK_APPEARANCE = {
        variables: {
          colorPrimary: "#eb5a3c",
          colorBackground: "#ffffff",
          colorInputBackground: "#ffffff",
          colorInputText: "#241f1a",
          colorText: "#241f1a",
          colorTextSecondary: "#6b5f52",
          colorDanger: "#c43d3d",
          colorSuccess: "#279485",
          colorWarning: "#d9a441",
          borderRadius: "4px",
          fontFamily: "'Instrument Sans', sans-serif",
        },
      };

      async function boot() {
        const clerk = await NSAA.getClerk();

        if (!clerk) {
          fallbackEl.classList.remove("d-none");
          fallbackBodyEl.innerHTML = NSAA.emptyState(
            "Sign-up setup needed",
            "Add your Clerk publishable key and Frontend API URL before this page will work.",
          );
          return;
        }

        if (clerk.user || clerk.isSignedIn) {
          window.location.href = redirectUrl;
          return;
        }

        clerk.mountSignUp(mountEl, {
          appearance: CLERK_APPEARANCE,
          signInUrl: `signin.html?redirect_url=${encodeURIComponent(redirectUrl)}`,
          afterSignUpUrl: redirectUrl,
          redirectUrl,
        });
      }

      boot();
    </script>
  </body>
</html>
